// ─── VENDAS ───────────────────────────────────────────────────────────────────
function Vendas({ db, commit }) {
  const [filter, setFilter] = useState("todos");
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ clienteId: "", data: today(), pagamento: "pix", desconto: 0, frete: 0, itens: [], obs: "" });
  const [itemForm, setItemForm] = useState({ produtoId: "", qtd: 1 });
  const [detail, setDetail] = useState(null);
  const [scanVenda, setScanVenda] = useState(false);

  const handleScanVenda = (code) => {
    setScanVenda(false);
    const p = db.produtos.find(x =>
      x.codigoBarras === code || x.codigo === code
    );
    if (!p) { alert("Produto não encontrado para o código: " + code); return; }
    if (!p.ativo || p.estoque <= 0) { alert("Produto indisponível ou sem estoque."); return; }
    setForm(f => {
      const exists = f.itens.findIndex(i => i.produtoId === p.id);
      if (exists >= 0) {
        const itens = [...f.itens]; itens[exists] = { ...itens[exists], qtd: itens[exists].qtd + 1 };
        return { ...f, itens };
      }
      return { ...f, itens: [...f.itens, { produtoId: p.id, nome: p.nome, qtd: 1, preco: p.preco }] };
    });
  };

  const filtered = db.vendas.filter(v => filter === "todos" || v.status === filter).sort((a, b) => b.data?.localeCompare(a.data));

  const addItem = () => {
    const p = db.produtos.find(x => x.id === +itemForm.produtoId);
    if (!p || itemForm.qtd <= 0) return;
    const exists = form.itens.findIndex(i => i.produtoId === p.id);
    if (exists >= 0) { const itens = [...form.itens]; itens[exists].qtd += +itemForm.qtd; setForm({ ...form, itens }); }
    else setForm({ ...form, itens: [...form.itens, { produtoId: p.id, nome: p.nome, qtd: +itemForm.qtd, preco: p.preco }] });
    setItemForm({ produtoId: "", qtd: 1 });
  };

  const total = form.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - +form.desconto + +form.frete;

  const save = () => {
    if (!form.clienteId || form.itens.length === 0) return;
    commit(db => {
      const id = db.nextId.vendas++;
      db.vendas.push({ ...form, id, clienteId: +form.clienteId, desconto: +form.desconto, frete: +form.frete, status: "pendente" });
      form.itens.forEach(it => {
        const idx = db.produtos.findIndex(p => p.id === it.produtoId);
        if (idx >= 0) db.produtos[idx].estoque = Math.max(0, db.produtos[idx].estoque - it.qtd);
        db.movimentos.push({ id: db.nextId.movimentos++, tipo: "saida", produtoId: it.produtoId, qtd: it.qtd, data: form.data, obs: `Venda #${id}`, custo: 0 });
      });
      return db;
    });
    setModal(false);
    setForm({ clienteId: "", data: today(), pagamento: "pix", desconto: 0, frete: 0, itens: [], obs: "" });
  };

  const updateStatus = (v, status) => commit(db => {
    const idx = db.vendas.findIndex(x => x.id === v.id);
    db.vendas[idx].status = status;
    if (status === "cancelado" && v.status !== "cancelado") v.itens.forEach(it => { const pi = db.produtos.findIndex(p => p.id === it.produtoId); if (pi >= 0) db.produtos[pi].estoque += it.qtd; });
    return db;
  });

  return (
    <div>
      <PageHeader title="Vendas" subtitle={`${db.vendas.length} pedidos`}
        action={<Btn onClick={() => setModal(true)}>+ Nova</Btn>} />

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
        {["todos", "pendente", "pago", "entregue", "cancelado"].map(s => (
          <button key={s} onClick={() => setFilter(s)} style={{ padding: "6px 12px", borderRadius: 20, border: "1px solid", borderColor: filter === s ? "#a855f7" : "#2d2d4a", background: filter === s ? "#a855f722" : "transparent", color: filter === s ? "#c084fc" : "#6b7280", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit" }}>
            {s === "todos" ? "Todos" : STATUS_VENDA[s]}
          </button>
        ))}
      </div>

      {filtered.map(v => {
        const cli = db.clientes.find(c => c.id === v.clienteId);
        const vtotal = v.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - (v.desconto || 0) + (v.frete || 0);
        return (
          <Row key={v.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>#{v.id} — {cli?.nome ?? "—"}</div>
                <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>{fmtDate(v.data)} · {v.pagamento} · {v.itens.length} item(s)</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontWeight: 800, color: "#a855f7" }}>{fmt(vtotal)}</div>
                <div style={{ marginTop: 4 }}><Badge status={v.status} map={STATUS_VENDA} /></div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <Btn small variant="ghost" onClick={() => setDetail(v)}>Ver</Btn>
              {v.status === "pendente" && <>
                <Btn small variant="success" onClick={() => updateStatus(v, "pago")}>✓ Pago</Btn>
                <Btn small variant="secondary" onClick={() => updateStatus(v, "entregue")}>Entregue</Btn>
                <Btn small variant="danger" onClick={() => updateStatus(v, "cancelado")}>×</Btn>
              </>}
            </div>
          </Row>
        );
      })}

      {modal && (
        <Modal title="Nova Venda" onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Sel label="Cliente *" value={form.clienteId} onChange={e => setForm({ ...form, clienteId: e.target.value })}>
              <option value="">Selecione...</option>
              {db.clientes.filter(c => c.ativo).map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
            </Sel>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Data" type="date" value={form.data} onChange={e => setForm({ ...form, data: e.target.value })} />
              <Sel label="Pagamento" value={form.pagamento} onChange={e => setForm({ ...form, pagamento: e.target.value })}>
                {PAGAMENTOS.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
              </Sel>
            </div>

            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12, border: "1px solid #1e1e38" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <p style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase" }}>Produtos</p>
                <button onClick={() => setScanVenda(true)} style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 7, padding: "6px 12px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>📷 Escanear</button>
              </div>
              <Sel value={itemForm.produtoId} onChange={e => setItemForm({ ...itemForm, produtoId: e.target.value })}>
                <option value="">Escolha um produto...</option>
                {db.produtos.filter(p => p.ativo && p.estoque > 0).map(p => <option key={p.id} value={p.id}>{p.nome} — {fmt(p.preco)} (est:{p.estoque})</option>)}
              </Sel>
              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                <input type="number" min="1" value={itemForm.qtd} onChange={e => setItemForm({ ...itemForm, qtd: +e.target.value })} style={{ width: 70, background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px", color: "#e2e8f0", fontSize: 15, textAlign: "center", flexShrink: 0 }} />
                <Btn full onClick={addItem}>+ Adicionar</Btn>
              </div>
              {form.itens.map((it, idx) => (
                <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #1e1e38", marginTop: 6 }}>
                  <span style={{ fontSize: 13, color: "#e2e8f0", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                    <span style={{ color: "#c084fc", fontWeight: 700, fontSize: 13 }}>{fmt(it.qtd * it.preco)}</span>
                    <button onClick={() => setForm({ ...form, itens: form.itens.filter((_, i) => i !== idx) })} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 20 }}>×</button>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Desconto (R$)" type="number" step="0.01" value={form.desconto} onChange={e => setForm({ ...form, desconto: e.target.value })} />
              <Input label="Frete (R$)" type="number" step="0.01" value={form.frete} onChange={e => setForm({ ...form, frete: e.target.value })} />
            </div>
            <Input label="Observações" value={form.obs} onChange={e => setForm({ ...form, obs: e.target.value })} />

            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#9ca3af", fontWeight: 700 }}>Total</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: "#a855f7" }}>{fmt(total)}</span>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setModal(false)}>Cancelar</Btn>
              <Btn full onClick={save}>Registrar Venda</Btn>
            </div>
          </div>
        </Modal>
      )}

      {scanVenda && (
        <BarcodeScannerModal
          title="Adicionar produto — escanear"
          onDetected={handleScanVenda}
          onClose={() => setScanVenda(false)}
        />
      )}

      {detail && (
        <Modal title={`Venda #${detail.id}`} onClose={() => setDetail(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[
                { l: "Cliente", v: db.clientes.find(c => c.id === detail.clienteId)?.nome },
                { l: "Data", v: fmtDate(detail.data) },
                { l: "Pagamento", v: detail.pagamento },
                { l: "Status", v: <Badge status={detail.status} map={STATUS_VENDA} /> },
              ].map(x => (
                <div key={x.l}><p style={{ margin: "0 0 2px", fontSize: 11, color: "#6b7280", textTransform: "uppercase" }}>{x.l}</p><p style={{ margin: 0, fontWeight: 700, color: "#e2e8f0" }}>{x.v}</p></div>
              ))}
            </div>
            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12 }}>
              {detail.itens.map((it, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: i < detail.itens.length - 1 ? "1px solid #1e1e38" : "none" }}>
                  <span style={{ color: "#cbd5e1", fontSize: 13, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <span style={{ color: "#c084fc", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>{fmt(it.qtd * it.preco)}</span>
                </div>
              ))}
              {detail.desconto > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderTop: "1px solid #1e1e38" }}><span style={{ color: "#f59e0b", fontSize: 13 }}>Desconto</span><span style={{ color: "#f59e0b", fontSize: 13 }}>-{fmt(detail.desconto)}</span></div>}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 0", borderTop: "2px solid #2d2d4a", marginTop: 4 }}>
                <span style={{ fontWeight: 800, color: "#e2e8f0" }}>TOTAL</span>
                <span style={{ fontWeight: 800, color: "#a855f7", fontSize: 18 }}>{fmt(detail.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - (detail.desconto || 0) + (detail.frete || 0))}</span>
              </div>
            </div>
            {detail.obs && <p style={{ margin: 0, fontSize: 13, color: "#6b7280", background: "#0a0a1a", padding: 12, borderRadius: 8 }}>💬 {detail.obs}</p>}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── EMPENHOS ─────────────────────────────────────────────────────────────────
function Empenhos({ db, commit }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ clienteId: "", data: today(), dataRetirada: "", obs: "", itens: [] });
  const [itemForm, setItemForm] = useState({ produtoId: "", qtd: 1 });

  const addItem = () => {
    const p = db.produtos.find(x => x.id === +itemForm.produtoId);
    if (!p) return;
    const exists = form.itens.findIndex(i => i.produtoId === p.id);
    if (exists >= 0) { const itens = [...form.itens]; itens[exists].qtd += +itemForm.qtd; setForm({ ...form, itens }); }
    else setForm({ ...form, itens: [...form.itens, { produtoId: p.id, nome: p.nome, qtd: +itemForm.qtd, preco: p.preco }] });
    setItemForm({ produtoId: "", qtd: 1 });
  };

  const save = () => {
    if (!form.clienteId || form.itens.length === 0) return;
    commit(db => { const id = db.nextId.empenhos++; db.empenhos.push({ ...form, id, clienteId: +form.clienteId, status: "ativo" }); return db; });
    setModal(false); setForm({ clienteId: "", data: today(), dataRetirada: "", obs: "", itens: [] });
  };

  const converter = e => commit(db => {
    db.empenhos.find(x => x.id === e.id).status = "retirado";
    const vid = db.nextId.vendas++;
    db.vendas.push({ id: vid, clienteId: e.clienteId, data: today(), status: "pendente", pagamento: "pix", desconto: 0, frete: 0, itens: e.itens, obs: `Empenho #${e.id}` });
    e.itens.forEach(it => { const pi = db.produtos.findIndex(p => p.id === it.produtoId); if (pi >= 0) db.produtos[pi].estoque = Math.max(0, db.produtos[pi].estoque - it.qtd); });
    return db;
  });

  const cancelar = e => commit(db => { db.empenhos.find(x => x.id === e.id).status = "cancelado"; return db; });

  return (
    <div>
      <PageHeader title="Empenhos" subtitle="Reservas para clientes"
        action={<Btn onClick={() => setModal(true)}>+ Novo</Btn>} />

      {[...db.empenhos].sort((a, b) => b.data?.localeCompare(a.data)).map(e => {
        const cli = db.clientes.find(c => c.id === e.clienteId);
        const total = e.itens.reduce((s, i) => s + i.qtd * i.preco, 0);
        return (
          <Row key={e.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>Empenho #{e.id}</div>
                <div style={{ fontSize: 13, color: "#818cf8", marginTop: 1 }}>{cli?.nome}</div>
                <div style={{ fontSize: 12, color: "#6b7280", marginTop: 1 }}>📅 {fmtDate(e.data)}{e.dataRetirada ? ` → ${fmtDate(e.dataRetirada)}` : ""}</div>
              </div>
              <Badge status={e.status} map={STATUS_EMP} />
            </div>
            <div style={{ margin: "10px 0 6px", borderTop: "1px solid #1e1e38", paddingTop: 8 }}>
              {e.itens.map((it, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                  <span style={{ color: "#cbd5e1", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <span style={{ color: "#c084fc", fontWeight: 600, flexShrink: 0 }}>{fmt(it.qtd * it.preco)}</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <span style={{ fontWeight: 800, color: "#a855f7", fontSize: 15 }}>{fmt(total)}</span>
              {e.status === "ativo" && (
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn small variant="success" onClick={() => converter(e)}>→ Venda</Btn>
                  <Btn small variant="danger" onClick={() => cancelar(e)}>× Cancelar</Btn>
                </div>
              )}
            </div>
            {e.obs && <p style={{ margin: "8px 0 0", fontSize: 12, color: "#6b7280" }}>💬 {e.obs}</p>}
          </Row>
        );
      })}

      {modal && (
        <Modal title="Novo Empenho" onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Sel label="Cliente *" value={form.clienteId} onChange={e => setForm({ ...form, clienteId: e.target.value })}>
              <option value="">Selecione...</option>
              {db.clientes.filter(c => c.ativo).map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
            </Sel>
            <Input label="Data Prevista de Retirada" type="date" value={form.dataRetirada} onChange={e => setForm({ ...form, dataRetirada: e.target.value })} />
            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12, border: "1px solid #1e1e38" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <p style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase" }}>Produtos</p>
                <button onClick={() => setScanVenda(true)} style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 7, padding: "6px 12px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>📷 Escanear</button>
              </div>
              <Sel value={itemForm.produtoId} onChange={e => setItemForm({ ...itemForm, produtoId: e.target.value })}>
                <option value="">Produto...</option>
                {db.produtos.filter(p => p.ativo).map(p => <option key={p.id} value={p.id}>{p.nome} — {fmt(p.preco)}</option>)}
              </Sel>
              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                <input type="number" min="1" value={itemForm.qtd} onChange={e => setItemForm({ ...itemForm, qtd: +e.target.value })} style={{ width: 70, background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px", color: "#e2e8f0", fontSize: 15, textAlign: "center", flexShrink: 0 }} />
                <Btn full onClick={addItem}>+ Adicionar</Btn>
              </div>
              {form.itens.map((it, idx) => (
                <div key={idx} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #1e1e38", marginTop: 6 }}>
                  <span style={{ fontSize: 13, color: "#e2e8f0", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                    <span style={{ color: "#c084fc", fontWeight: 700 }}>{fmt(it.qtd * it.preco)}</span>
                    <button onClick={() => setForm({ ...form, itens: form.itens.filter((_, i) => i !== idx) })} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 20 }}>×</button>
                  </div>
                </div>
              ))}
            </div>
            <Input label="Observações" value={form.obs} onChange={e => setForm({ ...form, obs: e.target.value })} />
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setModal(false)}>Cancelar</Btn>
              <Btn full onClick={save}>Salvar Empenho</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ESTOQUE ──────────────────────────────────────────────────────────────────
function Estoque({ db }) {
  const [filter, setFilter] = useState("todos");
  const movs = [...db.movimentos].sort((a, b) => b.data?.localeCompare(a.data));
  const filtered = filter === "todos" ? movs : movs.filter(m => m.tipo === filter);
  const valEstoque = db.produtos.filter(p => p.ativo).reduce((s, p) => s + p.estoque * p.custo, 0);
  const totEnt = db.movimentos.filter(m => m.tipo === "entrada").reduce((s, m) => s + m.qtd, 0);
  const totSai = db.movimentos.filter(m => m.tipo !== "entrada").reduce((s, m) => s + m.qtd, 0);

  return (
    <div>
      <PageHeader title="Estoque" subtitle="Inventário e movimentações" />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
        <Card style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
          <span style={{ fontSize: 22 }}>📥</span>
          <div><div style={{ fontSize: 16, fontWeight: 800, color: "#22c55e" }}>{totEnt} un.</div><div style={{ fontSize: 11, color: "#6b7280" }}>Entradas</div></div>
        </Card>
        <Card style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
          <span style={{ fontSize: 22 }}>📤</span>
          <div><div style={{ fontSize: 16, fontWeight: 800, color: "#ef4444" }}>{totSai} un.</div><div style={{ fontSize: 11, color: "#6b7280" }}>Saídas</div></div>
        </Card>
        <Card style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", gridColumn: "1/-1" }}>
          <span style={{ fontSize: 22 }}>💎</span>
          <div><div style={{ fontSize: 18, fontWeight: 800, color: "#a855f7" }}>{fmt(valEstoque)}</div><div style={{ fontSize: 11, color: "#6b7280" }}>Valor em estoque</div></div>
        </Card>
      </div>

      <Card style={{ marginBottom: 20 }}>
        <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Inventário Atual</h3>
        {db.produtos.filter(p => p.ativo).map(p => (
          <Row key={p.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                <div style={{ fontSize: 11, color: "#6b7280" }}>{p.categoria} · Custo: {fmt(p.custo)}</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 18, color: p.estoque === 0 ? "#ef4444" : p.estoque <= p.estoqueMin ? "#f59e0b" : "#22c55e" }}>{p.estoque}</div>
                <div style={{ fontSize: 11, color: "#6b7280" }}>{fmt(p.estoque * p.custo)}</div>
              </div>
            </div>
          </Row>
        ))}
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <h3 style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Histórico</h3>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {["todos", "entrada", "saida", "baixa"].map(t => (
              <button key={t} onClick={() => setFilter(t)} style={{ padding: "5px 10px", borderRadius: 20, border: "1px solid", borderColor: filter === t ? "#a855f7" : "#2d2d4a", background: filter === t ? "#a855f722" : "transparent", color: filter === t ? "#c084fc" : "#6b7280", cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: "inherit" }}>
                {t.charAt(0).toUpperCase() + t.slice(1)}
              </button>
            ))}
          </div>
        </div>
        {filtered.map(m => {
          const prod = db.produtos.find(p => p.id === m.produtoId);
          return (
            <Row key={m.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{prod?.nome ?? "—"}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>{fmtDate(m.data)}{m.obs ? ` · ${m.obs}` : ""}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <Badge status={m.tipo === "entrada" ? "ok" : m.tipo === "saida" ? "pendente" : "cancelado"} map={{ ok: "Entrada", pendente: "Saída", cancelado: "Baixa" }} />
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#e2e8f0", marginTop: 4 }}>{m.tipo === "entrada" ? "+" : "-"}{m.qtd} un.</div>
                </div>
              </div>
            </Row>
          );
        })}
      </Card>
    </div>
  );
}

// ─── BACKUP ───────────────────────────────────────────────────────────────────
function Backup({ db, commit }) {
  const [restoreState, setRestoreState] = useState("idle");
  const [restoreMsg, setRestoreMsg] = useState("");
  const [previewData, setPreviewData] = useState(null);
  const [dragOver, setDragOver] = useState(false);

  const doExport = () => {
    const payload = { _meta: { app: "BeautyControl", version: "1.0", exportedAt: new Date().toISOString() }, ...db };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `beautycontrol-backup-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const parseFile = file => {
    if (!file) return;
    new FileReader().onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.produtos || !data.clientes) { setRestoreState("error"); setRestoreMsg("Arquivo inválido."); return; }
        setPreviewData(data); setRestoreState("confirm");
      } catch { setRestoreState("error"); setRestoreMsg("Erro ao ler o arquivo."); }
    };
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.produtos || !data.clientes) { setRestoreState("error"); setRestoreMsg("Arquivo inválido."); return; }
        setPreviewData(data); setRestoreState("confirm");
      } catch { setRestoreState("error"); setRestoreMsg("Erro ao ler o arquivo."); }
    };
    r.readAsText(file);
  };

  const confirmRestore = () => {
    try { const { _meta, ...clean } = previewData; commit(() => clean); setRestoreState("success"); setPreviewData(null); }
    catch { setRestoreState("error"); setRestoreMsg("Erro ao restaurar."); }
  };

  const reset = () => { setRestoreState("idle"); setPreviewData(null); setRestoreMsg(""); };

  const stats = [
    { label: "Produtos", value: db.produtos.length, icon: "💄" },
    { label: "Clientes", value: db.clientes.length, icon: "👥" },
    { label: "Vendas", value: db.vendas.length, icon: "🛒" },
    { label: "Empenhos", value: db.empenhos.length, icon: "📋" },
    { label: "Movimentos", value: db.movimentos.length, icon: "📦" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <PageHeader title="Backup" subtitle="Exportar e importar dados" />

      <Card>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#a855f7,#7c3aed)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>💾</div>
          <div style={{ flex: 1 }}>
            <h2 style={{ margin: "0 0 6px", fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Exportar Backup</h2>
            <p style={{ margin: "0 0 14px", fontSize: 13, color: "#6b7280", lineHeight: 1.5 }}>Gera um arquivo <code style={{ background: "#1e1e38", padding: "1px 5px", borderRadius: 4, color: "#c084fc" }}>.json</code> com todos os dados. Salve no Google Drive, e-mail ou pen drive.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
              {stats.map(s => (
                <div key={s.label} style={{ background: "#0a0a1a", border: "1px solid #1e1e38", borderRadius: 8, padding: "6px 12px", display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 14 }}>{s.icon}</span>
                  <div><div style={{ fontWeight: 800, fontSize: 14, color: "#c084fc" }}>{s.value}</div><div style={{ fontSize: 10, color: "#4b5563", textTransform: "uppercase" }}>{s.label}</div></div>
                </div>
              ))}
            </div>
            <Btn full onClick={doExport}>⬇️ Baixar Backup</Btn>
          </div>
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#3b82f6,#1d4ed8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>📂</div>
          <div style={{ flex: 1 }}>
            <h2 style={{ margin: "0 0 6px", fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Restaurar Backup</h2>
            <p style={{ margin: "0 0 14px", fontSize: 13, color: "#6b7280", lineHeight: 1.5 }}>Selecione o arquivo de backup. <span style={{ color: "#f59e0b" }}>⚠️ Os dados atuais serão substituídos.</span></p>

            {restoreState === "idle" && (
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={e => { e.preventDefault(); setDragOver(false); parseFile(e.dataTransfer.files[0]); }}
                onClick={() => document.getElementById("bk-file").click()}
                style={{ border: `2px dashed ${dragOver ? "#a855f7" : "#2d2d4a"}`, borderRadius: 10, padding: "24px 16px", textAlign: "center", cursor: "pointer", background: dragOver ? "#a855f711" : "#0a0a1a" }}>
                <div style={{ fontSize: 30, marginBottom: 8 }}>📁</div>
                <div style={{ fontWeight: 700, color: "#e2e8f0", fontSize: 14, marginBottom: 4 }}>Toque para selecionar ou arraste</div>
                <div style={{ fontSize: 12, color: "#4b5563" }}>Arquivos <code style={{ color: "#818cf8" }}>.json</code> do BeautyControl</div>
                <input id="bk-file" type="file" accept=".json" style={{ display: "none" }} onChange={e => parseFile(e.target.files[0])} />
              </div>
            )}

            {restoreState === "confirm" && previewData && (
              <div style={{ background: "#0a0a1a", border: "1px solid #f59e0b44", borderRadius: 10, padding: 16 }}>
                <p style={{ margin: "0 0 8px", fontWeight: 700, color: "#f59e0b", fontSize: 14 }}>⚠️ Confirmar Restauração</p>
                {previewData._meta && <p style={{ margin: "0 0 12px", fontSize: 12, color: "#6b7280" }}>Exportado em: {new Date(previewData._meta.exportedAt).toLocaleString("pt-BR")}</p>}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                  {[{ l: "Produtos", v: previewData.produtos?.length }, { l: "Clientes", v: previewData.clientes?.length }, { l: "Vendas", v: previewData.vendas?.length }].map(s => (
                    <div key={s.l} style={{ background: "#12122a", border: "1px solid #1e1e38", borderRadius: 8, padding: "6px 12px" }}>
                      <div style={{ fontWeight: 800, fontSize: 15, color: "#3b82f6" }}>{s.v ?? 0}</div>
                      <div style={{ fontSize: 10, color: "#4b5563", textTransform: "uppercase" }}>{s.l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <Btn variant="ghost" full onClick={reset}>Cancelar</Btn>
                  <Btn variant="danger" full onClick={confirmRestore}>🔄 Restaurar</Btn>
                </div>
              </div>
            )}

            {restoreState === "success" && (
              <div style={{ background: "#22c55e11", border: "1px solid #22c55e44", borderRadius: 10, padding: 20, textAlign: "center" }}>
                <div style={{ fontSize: 34, marginBottom: 8 }}>✅</div>
                <div style={{ fontWeight: 800, color: "#22c55e", fontSize: 15, marginBottom: 4 }}>Restaurado com sucesso!</div>
                <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 14 }}>Todos os dados foram carregados.</div>
                <Btn full variant="success" onClick={reset}>OK</Btn>
              </div>
            )}

            {restoreState === "error" && (
              <div style={{ background: "#ef444411", border: "1px solid #ef444444", borderRadius: 10, padding: 20, textAlign: "center" }}>
                <div style={{ fontSize: 30, marginBottom: 8 }}>❌</div>
                <div style={{ fontWeight: 700, color: "#ef4444", marginBottom: 4 }}>Erro na restauração</div>
                <div style={{ fontSize: 13, color: "#9ca3af", marginBottom: 14 }}>{restoreMsg}</div>
                <Btn full variant="ghost" onClick={reset}>Tentar novamente</Btn>
              </div>
            )}
          </div>
        </div>
      </Card>

      <Card style={{ background: "#0a0a1a" }}>
        <h3 style={{ margin: "0 0 14px", fontSize: 12, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1 }}>📖 Como migrar para outro dispositivo</h3>
        {['Clique em "Baixar Backup" neste dispositivo.', "Salve no Google Drive, WhatsApp ou e-mail.", "No novo dispositivo, abra o BeautyControl.", 'Vá em "Backup" e selecione o arquivo .json.', "Confirme — seus dados serão carregados!"].map((txt, i) => (
          <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 10 }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", background: "linear-gradient(135deg,#a855f7,#7c3aed)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#fff", flexShrink: 0 }}>{i + 1}</div>
            <p style={{ margin: 0, fontSize: 13, color: "#9ca3af", lineHeight: 1.5 }}>{txt}</p>
          </div>
        ))}
      </Card>
    </div>
  );
}


// ─── INVENTÁRIO ───────────────────────────────────────────────────────────────
// Fluxo: idle → contando (produto a produto) → revisão → confirmado
function Inventario({ db, commit }) {
  const mobile = useIsMobile();

  // inventário ativo em andamento (em memória até confirmar)
  const [fase, setFase] = useState("idle"); // idle | contando | revisao
  const [contagens, setContagens] = useState({}); // { produtoId: qtdContada }
  const [obs, setObs] = useState("");
  const [search, setSearch] = useState("");
  const [produtoAtual, setProdutoAtual] = useState(null); // id do produto em foco no modal de contagem
  const [inputQtd, setInputQtd] = useState("");
  const [historico, setHistorico] = useState(false);
  const [scanInv, setScanInv] = useState(false);

  const handleScanInv = (code) => {
    setScanInv(false);
    const p = db.produtos.find(x =>
      x.ativo && (x.codigoBarras === code || x.codigo === code)
    );
    if (!p) { alert("Produto não encontrado: " + code); return; }
    abrirContagem(p);
  };

  const produtosAtivos = db.produtos.filter(p => p.ativo);
  const inventariosPassados = [...(db.inventarios || [])].sort((a, b) => b.data?.localeCompare(a.data));

  // quantos produtos já foram contados
  const contados = Object.keys(contagens).length;
  const total = produtosAtivos.length;
  const progresso = total === 0 ? 0 : Math.round((contados / total) * 100);

  // produtos filtrados pelo search na tela de contagem
  const filtrados = produtosAtivos.filter(p =>
    p.nome.toLowerCase().includes(search.toLowerCase()) ||
    (p.codigo || "").toLowerCase().includes(search.toLowerCase()) ||
    (p.categoria || "").toLowerCase().includes(search.toLowerCase())
  );

  const iniciar = () => {
    setContagens({});
    setObs("");
    setSearch("");
    setFase("contando");
  };

  const abrirContagem = (p) => {
    const atual = contagens[p.id];
    setInputQtd(atual !== undefined ? String(atual) : "");
    setProdutoAtual(p);
  };

  const salvarContagem = () => {
    if (inputQtd === "" || inputQtd === null) return;
    setContagens(prev => ({ ...prev, [produtoAtual.id]: Math.max(0, parseInt(inputQtd, 10) || 0) }));
    setProdutoAtual(null);
    setInputQtd("");
  };

  const removerContagem = (prodId) => {
    setContagens(prev => { const n = { ...prev }; delete n[prodId]; return n; });
  };

  // resumo para tela de revisão
  const itensRevisao = produtosAtivos.map(p => {
    const contado = contagens[p.id];
    const diferenca = contado !== undefined ? contado - p.estoque : null;
    return { ...p, contado, diferenca };
  }).filter(p => p.contado !== undefined);

  const itensNaoContados = produtosAtivos.filter(p => contagens[p.id] === undefined);

  const confirmar = () => {
    commit(db => {
      const id = db.nextId.inventarios == null ? 1 : db.nextId.inventarios++;
      if (!db.inventarios) db.inventarios = [];

      const itens = itensRevisao.map(p => ({
        produtoId: p.id,
        nome: p.nome,
        estoqueAntes: p.estoque,
        contado: p.contado,
        diferenca: p.diferenca,
      }));

      // Ajustar estoques e gerar movimentos
      itens.forEach(item => {
        const idx = db.produtos.findIndex(p => p.id === item.produtoId);
        if (idx < 0) return;
        db.produtos[idx].estoque = item.contado;
        if (item.diferenca !== 0) {
          const mid = db.nextId.movimentos++;
          db.movimentos.push({
            id: mid,
            tipo: item.diferenca > 0 ? "entrada" : "baixa",
            produtoId: item.produtoId,
            qtd: Math.abs(item.diferenca),
            data: today(),
            obs: `Ajuste de inventário #${id}`,
            custo: 0,
          });
        }
      });

      db.inventarios.push({
        id,
        data: today(),
        obs,
        itens,
        naoContados: itensNaoContados.map(p => p.id),
        totalProdutos: produtosAtivos.length,
        totalContados: itens.length,
      });

      return db;
    });

    setFase("idle");
    setContagens({});
    setObs("");
  };

  const cancelar = () => { setFase("idle"); setContagens({}); setObs(""); };

  // ── Tela idle ──
  if (fase === "idle") {
    return (
      <div>
        <PageHeader title="Inventário" subtitle="Contagem física de estoque" />

        <Card style={{ marginBottom: 20, textAlign: "center", padding: "28px 20px" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
          <h2 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 800, color: "#e2e8f0" }}>Novo Inventário</h2>
          <p style={{ margin: "0 0 20px", fontSize: 13, color: "#6b7280", lineHeight: 1.6, maxWidth: 340, marginLeft: "auto", marginRight: "auto" }}>
            Conte fisicamente cada produto e registre a quantidade real. O sistema irá calcular as diferenças e ajustar o estoque automaticamente.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
            {[
              { icon: "1️⃣", label: "Conte produto a produto" },
              { icon: "2️⃣", label: "Revise as diferenças" },
              { icon: "3️⃣", label: "Confirme o ajuste" },
            ].map(s => (
              <div key={s.label} style={{ background: "#0a0a1a", border: "1px solid #1e1e38", borderRadius: 10, padding: "12px 8px" }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
                <div style={{ fontSize: 11, color: "#9ca3af", lineHeight: 1.4 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <Btn full onClick={iniciar}>🚀 Iniciar Inventário</Btn>
        </Card>

        {/* Histórico */}
        {inventariosPassados.length > 0 && (
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Histórico de Inventários</h3>
              <button onClick={() => setHistorico(v => !v)} style={{ background: "none", border: "none", color: "#6b7280", cursor: "pointer", fontSize: 12 }}>{historico ? "Recolher ▲" : "Ver todos ▼"}</button>
            </div>
            {(historico ? inventariosPassados : inventariosPassados.slice(0, 3)).map(inv => {
              const ajustes = inv.itens.filter(i => i.diferenca !== 0).length;
              const positivos = inv.itens.filter(i => i.diferenca > 0).length;
              const negativos = inv.itens.filter(i => i.diferenca < 0).length;
              return (
                <Row key={inv.id}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>Inventário #{inv.id}</div>
                      <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>
                        📅 {fmtDate(inv.data)} · {inv.totalContados}/{inv.totalProdutos} produtos contados
                      </div>
                      {inv.obs && <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2 }}>💬 {inv.obs}</div>}
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      {ajustes === 0
                        ? <Badge status="ok" map={{ ok: "Sem ajustes" }} />
                        : <Badge status="pendente" map={{ pendente: `${ajustes} ajuste(s)` }} />
                      }
                      {ajustes > 0 && (
                        <div style={{ fontSize: 11, marginTop: 4, display: "flex", gap: 6, justifyContent: "flex-end" }}>
                          {positivos > 0 && <span style={{ color: "#22c55e" }}>+{positivos}</span>}
                          {negativos > 0 && <span style={{ color: "#ef4444" }}>-{negativos}</span>}
                        </div>
                      )}
                    </div>
                  </div>
                </Row>
              );
            })}
          </Card>
        )}
      </div>
    );
  }

  // ── Tela de revisão ──
  if (fase === "revisao") {
    const totalDif = itensRevisao.reduce((s, p) => s + Math.abs(p.diferenca || 0), 0);
    const comDif = itensRevisao.filter(p => p.diferenca !== 0).length;
    return (
      <div>
        <PageHeader title="Revisão do Inventário" subtitle="Confirme os ajustes antes de aplicar" />

        {/* Resumo */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          <Card style={{ padding: "12px 14px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#a855f7" }}>{itensRevisao.length}</div>
            <div style={{ fontSize: 11, color: "#6b7280" }}>Produtos contados</div>
          </Card>
          <Card style={{ padding: "12px 14px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: comDif > 0 ? "#f59e0b" : "#22c55e" }}>{comDif}</div>
            <div style={{ fontSize: 11, color: "#6b7280" }}>Com diferença</div>
          </Card>
          {itensNaoContados.length > 0 && (
            <Card style={{ padding: "12px 14px", gridColumn: "1/-1", border: "1px solid #f59e0b33" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#f59e0b" }}>⚠️ {itensNaoContados.length} produto(s) não contado(s)</div>
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 4 }}>
                {itensNaoContados.map(p => p.nome).join(", ")}
              </div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 4 }}>O estoque desses produtos <b>não será alterado</b>.</div>
            </Card>
          )}
        </div>

        {/* Lista de diferenças */}
        {itensRevisao.filter(p => p.diferenca !== 0).length > 0 && (
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", letterSpacing: 1 }}>⚡ Produtos com diferença</h3>
            {itensRevisao.filter(p => p.diferenca !== 0).map(p => (
              <Row key={p.id} style={{ borderColor: p.diferenca > 0 ? "#22c55e33" : "#ef444433" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                    <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>Sistema: {p.estoque} → Contado: {p.contado}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <span style={{ fontWeight: 800, fontSize: 16, color: p.diferenca > 0 ? "#22c55e" : "#ef4444" }}>
                      {p.diferenca > 0 ? "+" : ""}{p.diferenca}
                    </span>
                    <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{p.diferenca > 0 ? "sobra" : "falta"}</div>
                  </div>
                </div>
              </Row>
            ))}
          </Card>
        )}

        {itensRevisao.filter(p => p.diferenca === 0).length > 0 && (
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#22c55e", textTransform: "uppercase", letterSpacing: 1 }}>✅ Produtos sem diferença</h3>
            {itensRevisao.filter(p => p.diferenca === 0).map(p => (
              <Row key={p.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: "#9ca3af", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</span>
                  <span style={{ fontSize: 13, color: "#22c55e", fontWeight: 700, flexShrink: 0 }}>{p.contado} un. ✓</span>
                </div>
              </Row>
            ))}
          </Card>
        )}

        <div style={{ marginBottom: 16 }}>
          <Input label="Observação do Inventário" value={obs} onChange={e => setObs(e.target.value)} placeholder="Ex: Inventário mensal, conferência de estoque..." />
        </div>

        {comDif > 0 && (
          <div style={{ background: "#f59e0b11", border: "1px solid #f59e0b33", borderRadius: 10, padding: "12px 14px", marginBottom: 14, fontSize: 13, color: "#f59e0b" }}>
            ⚠️ Ao confirmar, <b>{comDif} produto(s)</b> terão seu estoque ajustado automaticamente e serão gerados {comDif} movimento(s) de ajuste.
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          <Btn variant="ghost" full onClick={() => setFase("contando")}>← Voltar</Btn>
          <Btn variant="success" full onClick={confirmar}>✓ Confirmar Inventário</Btn>
        </div>
        <div style={{ marginTop: 10 }}>
          <Btn variant="danger" full onClick={cancelar}>× Cancelar e descartar</Btn>
        </div>
      </div>
    );
  }

  // ── Tela de contagem ──
  return (
    <div>
      {/* Header fixo com progresso */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#e2e8f0" }}>Contagem Física</h1>
            <p style={{ margin: "2px 0 0", color: "#6b7280", fontSize: 12 }}>{contados} de {total} produtos contados</p>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn small variant="ghost" onClick={cancelar}>Cancelar</Btn>
            <Btn small variant="secondary" onClick={() => setScanInv(true)}>📷 Scan</Btn>
            <Btn small onClick={() => setFase("revisao")} style={{ opacity: contados === 0 ? 0.5 : 1 }}>Revisar →</Btn>
          </div>
        </div>
        {/* Barra de progresso */}
        <div style={{ background: "#1e1e38", borderRadius: 99, height: 8 }}>
          <div style={{ width: `${progresso}%`, height: "100%", background: progresso === 100 ? "linear-gradient(90deg,#22c55e,#16a34a)" : "linear-gradient(90deg,#a855f7,#7c3aed)", borderRadius: 99, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ textAlign: "right", fontSize: 11, color: "#6b7280", marginTop: 4 }}>{progresso}% concluído</div>
      </div>

      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Filtrar produto..." style={{ background: "#12122a", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, width: "100%", marginBottom: 12 }} />

      {/* Abas: Todos / Pendentes / Contados */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {["todos", "pendentes", "contados"].map(tab => {
          const counts = { todos: total, pendentes: total - contados, contados };
          return (
            <button key={tab} onClick={() => setSearch("")} style={{ flex: 1, padding: "7px 4px", borderRadius: 8, border: "1px solid #2d2d4a", background: "#12122a", color: "#6b7280", cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: "inherit" }}>
              {tab.charAt(0).toUpperCase() + tab.slice(1)} ({counts[tab]})
            </button>
          );
        })}
      </div>

      {filtrados.length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 16px", color: "#4b5563" }}>Nenhum produto encontrado.</div>
      )}

      {filtrados.map(p => {
        const contado = contagens[p.id];
        const foiContado = contado !== undefined;
        const diferenca = foiContado ? contado - p.estoque : null;
        return (
          <Row key={p.id} style={{ borderColor: foiContado ? (diferenca === 0 ? "#22c55e33" : diferenca > 0 ? "#3b82f633" : "#ef444433") : "#1e1e38" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {/* Status indicator */}
              <div style={{ width: 36, height: 36, borderRadius: 10, background: foiContado ? (diferenca === 0 ? "#22c55e22" : diferenca > 0 ? "#3b82f622" : "#ef444422") : "#1a1a2e", border: `2px solid ${foiContado ? (diferenca === 0 ? "#22c55e" : diferenca > 0 ? "#3b82f6" : "#ef4444") : "#2d2d4a"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16 }}>
                {foiContado ? (diferenca === 0 ? "✓" : diferenca > 0 ? "↑" : "↓") : "?"}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                <div style={{ fontSize: 11, color: "#6b7280", marginTop: 1 }}>
                  {p.categoria}{p.codigo ? ` · ${p.codigo}` : ""} · Sistema: <b style={{ color: "#9ca3af" }}>{p.estoque}</b>
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                {foiContado ? (
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 16, color: diferenca === 0 ? "#22c55e" : diferenca > 0 ? "#3b82f6" : "#ef4444" }}>{contado}</div>
                    {diferenca !== 0 && (
                      <div style={{ fontSize: 11, fontWeight: 700, color: diferenca > 0 ? "#22c55e" : "#ef4444" }}>{diferenca > 0 ? "+" : ""}{diferenca}</div>
                    )}
                  </div>
                ) : (
                  <div style={{ fontSize: 12, color: "#4b5563" }}>Não contado</div>
                )}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <Btn small full onClick={() => abrirContagem(p)}>
                {foiContado ? "✏️ Editar contagem" : "📝 Contar"}
              </Btn>
              {foiContado && (
                <Btn small variant="danger" onClick={() => removerContagem(p.id)}>×</Btn>
              )}
            </div>
          </Row>
        );
      })}

      {contados > 0 && (
        <div style={{ marginTop: 16 }}>
          <Btn full onClick={() => setFase("revisao")}>Revisar e confirmar → ({contados} produto(s))</Btn>
        </div>
      )}

      {scanInv && (
        <BarcodeScannerModal
          title="Escanear produto para contar"
          onDetected={handleScanInv}
          onClose={() => setScanInv(false)}
        />
      )}

      {/* Modal de contagem individual */}
      {produtoAtual && (
        <Modal title="Contar produto" onClose={() => setProdutoAtual(null)}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 13, color: "#9ca3af", marginBottom: 4 }}>{produtoAtual.categoria}</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#e2e8f0", marginBottom: 8 }}>{produtoAtual.nome}</div>
            <div style={{ display: "inline-flex", gap: 16, background: "#0a0a1a", borderRadius: 10, padding: "10px 20px" }}>
              <div><div style={{ fontSize: 20, fontWeight: 800, color: "#6b7280" }}>{produtoAtual.estoque}</div><div style={{ fontSize: 11, color: "#4b5563" }}>No sistema</div></div>
              <div style={{ width: 1, background: "#1e1e38" }} />
              <div><div style={{ fontSize: 20, fontWeight: 800, color: "#c084fc" }}>{inputQtd !== "" ? inputQtd : "—"}</div><div style={{ fontSize: 11, color: "#4b5563" }}>Contado</div></div>
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#9ca3af", letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>Quantidade contada fisicamente</label>
            <input
              type="number"
              min="0"
              value={inputQtd}
              onChange={e => setInputQtd(e.target.value)}
              autoFocus
              placeholder="0"
              style={{ background: "#1a1a2e", border: "1px solid #a855f7", borderRadius: 10, padding: "16px", color: "#e2e8f0", fontSize: 28, fontWeight: 800, outline: "none", width: "100%", textAlign: "center" }}
            />
          </div>

          {/* Teclado numérico rápido */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 16 }}>
            {[1, 2, 3, 5, 10, 15, 20, 50].map(n => (
              <button key={n} onClick={() => setInputQtd(String(n))} style={{ background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 6px", color: "#c084fc", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                {n}
              </button>
            ))}
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" full onClick={() => setProdutoAtual(null)}>Cancelar</Btn>
            <Btn full onClick={salvarContagem} style={{ opacity: inputQtd === "" ? 0.5 : 1 }}>✓ Salvar contagem</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


// ─── NAV & SHELL ──────────────────────────────────────────────────────────────
const NAV = [
  { id: "dashboard", label: "Dashboard", icon: "🏠" },
  { id: "produtos", label: "Produtos", icon: "💄" },
  { id: "clientes", label: "Clientes", icon: "👥" },
  { id: "vendas", label: "Vendas", icon: "🛒" },
  { id: "empenhos", label: "Empenhos", icon: "📋" },
  { id: "estoque", label: "Estoque", icon: "📦" },
  { id: "inventario", label: "Inventário", icon: "🔢" },
  { id: "backup", label: "Backup", icon: "💾" },
];

function App() {
  const [page, setPage] = useState("dashboard");
  const { db, commit } = useDB();
  const mobile = useIsMobile();
  const PAGE = { dashboard: Dashboard, produtos: Produtos, clientes: Clientes, vendas: Vendas, empenhos: Empenhos, estoque: Estoque, inventario: Inventario, backup: Backup };
  const PageComp = PAGE[page];

  return (
    <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", height: "100vh", height: "100dvh", overflow: "hidden", background: "#07071a", color: "#e2e8f0", fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2d2d4a; border-radius: 3px; }
        input, select, button, textarea { font-family: inherit; }
        select option { background: #1a1a2e; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
        @keyframes scanline {
          0%,100% { transform: translateY(-10px); opacity: 0.4; }
          50% { transform: translateY(10px); opacity: 1; }
        }
      `}</style>

      {/* ── Desktop sidebar ── */}
      {!mobile && (
        <aside style={{ width: 196, flexShrink: 0, background: "#0a0a1f", borderRight: "1px solid #1e1e38", display: "flex", flexDirection: "column", height: "100vh", overflowY: "auto" }}>
          <div style={{ padding: "16px 14px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #1e1e38" }}>
            <span style={{ fontSize: 22 }}>💅</span>
            <div>
              <div style={{ fontWeight: 800, fontSize: 13, background: "linear-gradient(90deg,#c084fc,#818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>BeautyControl</div>
              <div style={{ fontSize: 9, color: "#4b5563", letterSpacing: 1, textTransform: "uppercase" }}>Gestão</div>
            </div>
          </div>
          <nav style={{ flex: 1, padding: "8px 6px" }}>
            {NAV.map((n, i) => (
              <div key={n.id}>
                {i === NAV.length - 1 && <div style={{ height: 1, background: "#1e1e38", margin: "6px 4px" }} />}
                <button onClick={() => setPage(n.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 9, padding: "9px 10px", borderRadius: 9, border: "none", cursor: "pointer", background: page === n.id ? "#a855f722" : "transparent", color: page === n.id ? "#c084fc" : "#6b7280", fontWeight: page === n.id ? 700 : 500, fontSize: 13, marginBottom: 2, textAlign: "left", borderLeft: `3px solid ${page === n.id ? "#a855f7" : "transparent"}` }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>{n.icon}</span>{n.label}
                </button>
              </div>
            ))}
          </nav>
          <div style={{ padding: "10px", borderTop: "1px solid #1e1e38", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: "#2d2d4a" }}>BeautyControl v1.0</div>
          </div>
        </aside>
      )}

      {/* ── Main ── */}
      <main style={{ flex: 1, minWidth: 0, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", height: mobile ? "calc(100dvh - 58px)" : "100vh", padding: mobile ? "14px 14px 24px" : "22px 24px" }}>
        {mobile && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
            <span style={{ fontSize: 20 }}>💅</span>
            <span style={{ fontWeight: 800, fontSize: 14, background: "linear-gradient(90deg,#c084fc,#818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>BeautyControl</span>
            <span style={{ marginLeft: "auto", fontSize: 12, color: "#6b7280", fontWeight: 700 }}>{NAV.find(n => n.id === page)?.label}</span>
          </div>
        )}
        <PageComp db={db} commit={commit} />
      </main>

      {/* ── Mobile bottom nav ── */}
      {mobile && (
        <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0a0a1f", borderTop: "1px solid #1e1e38", display: "flex", zIndex: 200 }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "7px 2px 8px", background: "none", border: "none", cursor: "pointer", borderTop: `2px solid ${page === n.id ? "#a855f7" : "transparent"}`, minWidth: 0 }}>
              <span style={{ fontSize: 17, lineHeight: 1 }}>{n.icon}</span>
              <span style={{ fontSize: 8, marginTop: 3, color: page === n.id ? "#c084fc" : "#4b5563", fontWeight: page === n.id ? 700 : 400, letterSpacing: 0.1 }}>{n.label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

// ── Mount ──
const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));

// ── Hide splash ──
setTimeout(() => {
  const s = document.getElementById('splash');
  if (s) { s.classList.add('fade'); setTimeout(() => { try { s.remove(); } catch(e){} }, 500); }
}, 1200);
</script>

<!-- ── PWA bootstrap ── -->
<script>
(function () {
  'use strict';

  // ── Register real service worker file ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {
        // Fallback: try relative path (works for GitHub Pages subpath)
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    });
  }

  // ── PWA install banner ──
  let deferred = null;
  const standalone = () =>
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferred = e;
    if (standalone()) return;

    // Show install card after 2 seconds
    setTimeout(() => {
      if (!deferred) return;
      const card = document.createElement('div');
      card.id = 'pwa-card';
      card.style.cssText = 'position:fixed;bottom:66px;left:10px;right:10px;z-index:500;animation:slideUp .3s ease';
      card.innerHTML = `
        <div style="background:#1e1e38;border:1px solid #a855f7;border-radius:16px;padding:14px 16px;
                    display:flex;align-items:center;gap:12px;box-shadow:0 8px 40px #000c;font-family:sans-serif">
          <span style="font-size:28px;flex-shrink:0">&#x1F485;</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:800;color:#e2e8f0;font-size:14px">Instalar BeautyControl</div>
            <div style="font-size:12px;color:#9ca3af;margin-top:3px">Use offline &bull; Tela cheia &bull; Acesso à câmera</div>
          </div>
          <button id="pwa-yes" style="background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;
            border-radius:9px;color:#fff;padding:9px 14px;font-weight:700;font-size:13px;
            cursor:pointer;white-space:nowrap;font-family:inherit">Instalar</button>
          <button id="pwa-no" style="background:none;border:none;color:#6b7280;
            cursor:pointer;font-size:22px;padding:0 4px;line-height:1;flex-shrink:0">&times;</button>
        </div>
        <style>@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}</style>
      `;
      document.body.appendChild(card);

      document.getElementById('pwa-yes').addEventListener('click', async () => {
        if (!deferred) return;
        deferred.prompt();
        const { outcome } = await deferred.userChoice;
        deferred = null;
        card.remove();
        // After install, camera permission will work on next launch
        if (outcome === 'accepted') {
          setTimeout(() => {
            const notice = document.createElement('div');
            notice.style.cssText = 'position:fixed;top:16px;left:16px;right:16px;z-index:900;background:#22c55e22;border:1px solid #22c55e66;border-radius:12px;padding:12px 16px;font-family:sans-serif;font-size:13px;color:#22c55e;text-align:center';
            notice.textContent = '✅ App instalado! Abra pela tela inicial para câmera e uso offline.';
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 5000);
          }, 1000);
        }
      });
      document.getElementById('pwa-no').addEventListener('click', () => {
        card.remove(); deferred = null;
      });
    }, 2000);
  });

  window.addEventListener('appinstalled', () => { deferred = null; });

  // ── HTTPS redirect (safety net) ──
  if (location.protocol === 'http:' && location.hostname !== 'localhost' && !location.hostname.startsWith('192.168') && !location.hostname.startsWith('127.')) {
    location.replace(location.href.replace('http:', 'https:'));
  }
})();
</script>
