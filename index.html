function useDB() {
  const [db, setDB] = useState(() => {
    try { const r = localStorage.getItem(DB_KEY); return r ? JSON.parse(r) : defaultDB; } catch { return defaultDB; }
  });
  // External sync listener — Drive hook registers here so every commit triggers a push
  const syncListenerRef = useRef(null);

  const commit = useCallback((updater) => {
    setDB(prev => {
      const next = updater(JSON.parse(JSON.stringify(prev)));
      try { localStorage.setItem(DB_KEY, JSON.stringify(next)); } catch {}
      // Fire sync listener after state settles (debounced in the listener itself)
      if (syncListenerRef.current) {
        try { syncListenerRef.current(next); } catch (_) {}
      }
      return next;
    });
  }, []);

  return { db, commit, syncListenerRef };
}

// ─── Responsive hook ──────────────────────────────────────────────────────────
function useIsMobile() {
  const [mobile, setMobile] = useState(() => typeof window !== "undefined" && window.innerWidth < 640);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 640);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return mobile;
}


// ─── BARCODE SCANNER ─────────────────────────────────────────────────────────
function BarcodeScannerModal({ onDetected, onClose, title = "Escanear Código" }) {
  const [status, setStatus] = useState("loading"); // loading | active | error | detected
  const [errMsg, setErrMsg] = useState("");
  const scannerRef  = useRef(null);
  const doneRef     = useRef(false); // prevents double-fire
  const containerId = useRef("bc-" + Math.random().toString(36).slice(2)).current;

  // Safely stop the scanner — always awaited before any state change
  const stopScanner = useCallback(async () => {
    const sc = scannerRef.current;
    if (!sc) return;
    scannerRef.current = null;
    try { await sc.stop(); } catch (_) {}
    try { sc.clear(); }      catch (_) {}
  }, []);

  useEffect(() => {
    const start = async () => {
      // Lazy-load html5-qrcode from CDN once
      if (!window.Html5Qrcode) {
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
          s.onload = resolve;
          s.onerror = () => reject(new Error("Falha ao carregar leitor de câmera"));
          document.head.appendChild(s);
        });
      }

      if (doneRef.current) return; // already closed before load finished

      try {
        const scanner = new window.Html5Qrcode(containerId);
        scannerRef.current = scanner;

        await scanner.start(
          { facingMode: "environment" },
          { fps: 12, qrbox: { width: 260, height: 120 }, aspectRatio: 1.7 },

          // ── SUCCESS callback ──────────────────────────────────────────────
          async (decodedText) => {
            if (doneRef.current) return; // guard against firing twice
            doneRef.current = true;

            try { navigator.vibrate?.(80); } catch (_) {}
            setStatus("detected"); // show "lido!" state while we stop

            await stopScanner();   // WAIT for full stop before unmounting
            onDetected(decodedText); // only NOW hand control back to parent
          },

          () => {} // per-frame decode errors — ignore silently
        );
        setStatus("active");
      } catch (e) {
        const msg = String(e?.message || e);
        if (/Permission|NotAllowed/i.test(msg)) {
          setErrMsg("Permissão de câmera negada. Vá em Configurações → Apps → Chrome → Permissões → Câmera → Permitir.");
        } else if (/NotFound|Devices|not found/i.test(msg)) {
          setErrMsg("Nenhuma câmera encontrada neste dispositivo.");
        } else {
          setErrMsg("Erro ao abrir câmera: " + msg);
        }
        setStatus("error");
      }
    };

    start();

    // Cleanup when React unmounts the modal (e.g. user taps Fechar)
    return () => { doneRef.current = true; stopScanner(); };
  }, []);

  const handleClose = useCallback(async () => {
    if (doneRef.current) return;
    doneRef.current = true;
    await stopScanner();
    onClose();
  }, [stopScanner, onClose]);

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 2000, display: "flex", flexDirection: "column" }}>

      {/* ── Header ── */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", background: "#0d0d20", borderBottom: "1px solid #2d2d4a", flexShrink: 0 }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 16, color: "#e2e8f0" }}>📷 {title}</div>
          <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>
            {status === "loading"  && "Iniciando câmera…"}
            {status === "active"   && "Aponte para o código de barras"}
            {status === "detected" && "✅ Código lido! Voltando…"}
            {status === "error"    && "Câmera indisponível"}
          </div>
        </div>
        <button onClick={handleClose}
          style={{ background: "#ef444422", border: "1px solid #ef444444", borderRadius: 8, color: "#ef4444", padding: "8px 16px", cursor: "pointer", fontWeight: 700, fontSize: 15, fontFamily: "inherit" }}>
          Fechar
        </button>
      </div>

      {/* ── Camera viewport ── */}
      <div style={{ flex: 1, position: "relative", background: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>

        {status === "loading" && (
          <div style={{ position: "absolute", textAlign: "center", color: "#6b7280", zIndex: 1 }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>📷</div>
            <div style={{ fontSize: 14 }}>Abrindo câmera…</div>
          </div>
        )}

        {status === "detected" && (
          <div style={{ position: "absolute", inset: 0, background: "#a855f733", zIndex: 10,
                        display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#0d0d20", border: "2px solid #a855f7", borderRadius: 16,
                          padding: "20px 32px", textAlign: "center" }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
              <div style={{ color: "#c084fc", fontWeight: 800, fontSize: 16 }}>Código lido!</div>
              <div style={{ color: "#6b7280", fontSize: 13, marginTop: 4 }}>Voltando…</div>
            </div>
          </div>
        )}

        {status === "error" && (
          <div style={{ textAlign: "center", padding: "0 28px" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
            <div style={{ color: "#ef4444", fontSize: 15, fontWeight: 700, marginBottom: 10 }}>Câmera indisponível</div>
            <div style={{ color: "#9ca3af", fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-line" }}>{errMsg}</div>
          </div>
        )}

        {/* html5-qrcode renders <video> inside this div */}
        <div id={containerId}
          style={{ width: "100%", height: "100%", display: status === "error" ? "none" : "block" }} />

        {/* Scan frame — visible only when camera is active */}
        {status === "active" && (
          <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center",

              ))}

                            background: "linear-gradient(90deg,transparent,#a855f7,#c084fc,#a855f7,transparent)",
                            animation: "scanline 1.6s ease-in-out infinite" }} />
            </div>
          </div>
        )}

        <div style={{ fontSize: 11, color: "#4b5563" }}>EAN-13 · EAN-8 · Code128 · QR Code · UPC-A</div>
      </div>
    </div>
  );
}

// ─── SearchableSelect — fuzzy search combobox ────────────────────────────────
function SearchableSelect({ label, options, value, onChange, placeholder }) {
  const [query, setQuery]   = useState("");
  const [open, setOpen]     = useState(false);
  const wrapRef             = useRef(null);
  const selected            = options.find(o => String(o.value) === String(value));

  // Close on outside click
  useEffect(() => {
    const fn = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  // Approximate match: every word of the query must appear somewhere in the label
  const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const filtered = options.filter(o => {
    const lbl = o.label.toLowerCase();
    return words.length === 0 || words.every(w => lbl.includes(w));
  });

  const pick = o => { onChange(o.value); setQuery(""); setOpen(false); };
  const clear = () => { onChange(""); setQuery(""); };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, position: "relative" }} ref={wrapRef}>
      {label && <label style={{ fontSize: 12, fontWeight: 600, color: "#9ca3af", letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>}
      <div style={{ display: "flex", gap: 0 }}>
        <input
          value={open ? query : (selected?.label || "")}
          onChange={e => { setQuery(e.target.value); setOpen(true); }}
          onFocus={() => { setOpen(true); setQuery(""); }}
          placeholder={placeholder || "Digite para filtrar…"}
          style={{ flex: 1, background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: value ? "8px 0 0 8px" : 8, padding: "10px 12px", color: "#e2e8f0", fontSize: 15, outline: "none" }}
          onBlur={e => e.target.style.borderColor = "#2d2d4a"}
          onKeyDown={e => { if (e.key === "Escape") setOpen(false); if (e.key === "Enter" && filtered.length) pick(filtered[0]); }}
        />
        {value && (
          <button onClick={clear} style={{ background: "#1a1a2e", border: "1px solid #2d2d4a", borderLeft: "none", borderRadius: "0 8px 8px 0", padding: "0 10px", color: "#6b7280", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>×</button>
        )}
      </div>
      {open && (
        <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 999, background: "#0d0d20", border: "1px solid #2d2d4a", borderRadius: 8, marginTop: 2, maxHeight: 220, overflowY: "auto", boxShadow: "0 8px 24px #000a" }}>
          {filtered.length === 0 && (
            <div style={{ padding: "10px 12px", fontSize: 13, color: "#4b5563" }}>Nenhum resultado</div>
          )}
          {filtered.map(o => (
            <div key={o.value} onMouseDown={() => pick(o)} style={{ padding: "10px 12px", fontSize: 14, color: String(o.value) === String(value) ? "#c084fc" : "#e2e8f0", cursor: "pointer", background: String(o.value) === String(value) ? "#a855f722" : "transparent", borderBottom: "1px solid #0f0f1e" }}
              onMouseEnter={e => e.currentTarget.style.background = "#1e1e38"}
              onMouseLeave={e => e.currentTarget.style.background = String(o.value) === String(value) ? "#a855f722" : "transparent"}>
              {o.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmt = v => v?.toLocaleString("pt-BR", { style: "currency", currency: "BRL" }) ?? "—";
const fmtDate = d => d ? new Date(d + "T12:00:00").toLocaleDateString("pt-BR") : "—";
const today = () => new Date().toISOString().split("T")[0];
const STATUS_VENDA = { pendente: "Pendente", pago: "Pago", cancelado: "Cancelado", entregue: "Entregue" };
// Each venda now has: status ("pendente"|"cancelado"), pago: bool, entregue: bool
const vendaLabel = v => {
  if (v.status === "cancelado") return { label: "Cancelado", color: "#ef4444" };
  if (v.pago && v.entregue)    return { label: "Pago e Entregue", color: "#22c55e" };
  if (v.pago)                  return { label: "Pago", color: "#3b82f6" };
  if (v.entregue)              return { label: "Entregue", color: "#f59e0b" };
  return                              { label: "Pendente", color: "#6b7280" };
};
const VendaBadge = ({ v }) => {
  const { label, color } = vendaLabel(v);
  return <span style={{ background: color+"22", color, border: `1px solid ${color}44`, borderRadius: 20, padding: "2px 8px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>;
};
// Helper: calc empenhado por produto a partir das vendas ativas
const calcEmpenhado = (db, produtoId) =>
  db.vendas.filter(v => v.status !== "cancelado" && !v.entregue)
    .flatMap(v => v.itens).filter(i => i.produtoId === produtoId)
    .reduce((s, i) => s + i.qtd, 0);
const STATUS_EMP = { ativo: "Ativo", retirado: "Retirado", cancelado: "Cancelado" };
const CATEGORIAS = ["Labial", "Rosto", "Olhos", "Sobrancelha", "Skincare", "Fragrância", "Unhas", "Cabelo", "Corpo", "Outros"];
const PAGAMENTOS = ["pix", "dinheiro", "cartao", "crediario", "outro"];

const Badge = ({ status, map }) => {
  const colors = { pago: "#22c55e", entregue: "#3b82f6", pendente: "#f59e0b", cancelado: "#ef4444", ativo: "#a855f7", retirado: "#22c55e", baixo: "#ef4444", ok: "#22c55e", critico: "#f97316" };
  const c = colors[status] || "#6b7280";
  return <span style={{ background: c + "22", color: c, border: `1px solid ${c}44`, borderRadius: 20, padding: "2px 8px", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap" }}>{map ? map[status] : status}</span>;
};

const Input = ({ label, error, ...props }) => (

      onFocus={e => e.target.style.border = "1px solid #c084fc"}
      onBlur={e => e.target.style.border = `1px solid ${error ? "#ef4444" : "#2d2d4a"}`} />
    {error && <span style={{ fontSize: 11, color: "#ef4444" }}>{error}</span>}
  </div>
);

const Sel = ({ label, children, ...props }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 12, fontWeight: 600, color: "#9ca3af", letterSpacing: 0.5, textTransform: "uppercase" }}>{label}</label>}
    <select {...props} style={{ background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 12px", color: "#e2e8f0", fontSize: 15, outline: "none", cursor: "pointer", width: "100%", ...(props.style || {}) }}>{children}</select>
  </div>
);

const Btn = ({ children, variant = "primary", small, full, ...props }) => {
  const s = {
    primary: { background: "linear-gradient(135deg,#a855f7,#7c3aed)", color: "#fff", border: "none" },
    secondary: { background: "#1e1e38", color: "#c4b5fd", border: "1px solid #3d3d60" },
    danger: { background: "#ef444422", color: "#ef4444", border: "1px solid #ef444444" },
    success: { background: "#22c55e22", color: "#22c55e", border: "1px solid #22c55e44" },
    ghost: { background: "transparent", color: "#9ca3af", border: "1px solid #2d2d4a" },
  };
  return (
    <button {...props} style={{ ...s[variant], borderRadius: 8, padding: small ? "6px 12px" : "10px 18px", fontSize: small ? 12 : 14, fontWeight: 600, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, whiteSpace: "nowrap", fontFamily: "inherit", width: full ? "100%" : undefined, ...(props.style || {}) }}>
      {children}
    </button>
  );
};

const Card = ({ children, style }) => (
  <div style={{ background: "#12122a", border: "1px solid #1e1e38", borderRadius: 14, padding: 16, ...(style || {}) }}>{children}</div>
);

const Modal = ({ title, onClose, children }) => {
  const mobile = useIsMobile();
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000000bb", zIndex: 1000, display: "flex", alignItems: mobile ? "flex-end" : "center", justifyContent: "center", padding: mobile ? 0 : 16 }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#0d0d20", border: "1px solid #2d2d4a", borderRadius: mobile ? "16px 16px 0 0" : 16, width: "100%", maxWidth: mobile ? "100%" : 560, maxHeight: mobile ? "92vh" : "88vh", overflowY: "auto", boxShadow: "0 25px 60px #000c" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderBottom: "1px solid #1e1e38", position: "sticky", top: 0, background: "#0d0d20", zIndex: 1 }}>
          <h2 style={{ margin: 0, fontSize: 17, fontWeight: 800, color: "#e2e8f0" }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#9ca3af", cursor: "pointer", fontSize: 26, lineHeight: 1, padding: "0 4px" }}>×</button>
        </div>
        <div style={{ padding: 16 }}>{children}</div>
      </div>
    </div>
  );
};

const Row = ({ children, style }) => (
  <div style={{ background: "#0d0d1e", border: "1px solid #1e1e38", borderRadius: 10, padding: "12px 14px", marginBottom: 8, ...(style || {}) }}>{children}</div>
);

const PageHeader = ({ title, subtitle, action }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
    <div>
      <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#e2e8f0" }}>{title}</h1>
      {subtitle && <p style={{ margin: "2px 0 0", color: "#6b7280", fontSize: 13 }}>{subtitle}</p>}
    </div>
    {action}
  </div>
);

const SearchBar = ({ value, onChange, placeholder }) => (
  <input value={value} onChange={onChange} placeholder={placeholder || "🔍 Buscar..."} style={{ background: "#12122a", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, width: "100%", marginBottom: 14 }} />
);

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ db }) {
  const totalMes = db.vendas.filter(v => v.data?.startsWith("2026-03") && v.status !== "cancelado")
    .reduce((s, v) => s + v.itens.reduce((a, i) => a + i.qtd * i.preco, 0) - (v.desconto || 0), 0);
  const alerta = db.produtos.filter(p => p.ativo && p.estoque <= p.estoqueMin);
  const empPend = db.empenhos.filter(e => e.status === "ativo").length;
  const vndPend = db.vendas.filter(v => v.status === "pendente").length;

  const kpis = [
    { label: "Faturamento", value: fmt(totalMes), icon: "💰", color: "#a855f7" },
    { label: "Pendentes", value: vndPend, icon: "🛒", color: "#f59e0b" },
    { label: "Empenhos", value: empPend, icon: "📋", color: "#3b82f6" },
    { label: "Alerta estoque", value: alerta.length, icon: "⚠️", color: "#ef4444" },
  ];

  const ultimasVendas = [...db.vendas].sort((a, b) => b.data?.localeCompare(a.data)).slice(0, 5);
  const getQtd = p => db.vendas.filter(v => v.status !== "cancelado").flatMap(v => v.itens).filter(i => i.produtoId === p.id).reduce((s, i) => s + i.qtd, 0);
  const topProd = [...db.produtos].sort((a, b) => getQtd(b) - getQtd(a)).slice(0, 4);
  const maxQtd = Math.max(1, ...topProd.map(getQtd));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <h1 style={{ margin: "0 0 2px", fontSize: 22, fontWeight: 800, background: "linear-gradient(90deg,#c084fc,#818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Painel</h1>
        <p style={{ margin: 0, color: "#6b7280", fontSize: 13 }}>Visão geral do seu negócio ✨</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        {kpis.map(k => (
          <Card key={k.label} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
            <span style={{ fontSize: 24 }}>{k.icon}</span>
            <div><div style={{ fontSize: 18, fontWeight: 800, color: k.color, lineHeight: 1.1 }}>{k.value}</div><div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>{k.label}</div></div>
          </Card>
        ))}
      </div>

      <Card>
        <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Últimas Vendas</h3>
        {ultimasVendas.map(v => {
          const cli = db.clientes.find(c => c.id === v.clienteId);
          const total = v.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - (v.desconto || 0);
          return (
            <Row key={v.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cli?.nome ?? "—"}</div>
                  <div style={{ fontSize: 12, color: "#6b7280", marginTop: 1 }}>{fmtDate(v.data)}</div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontWeight: 800, color: "#a855f7" }}>{fmt(total)}</div>
                  <div style={{ marginTop: 4 }}><Badge status={v.status} map={STATUS_VENDA} /></div>
                </div>
              </div>
            </Row>
          );
        })}
      </Card>

      <Card>
        <h3 style={{ margin: "0 0 14px", fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Mais Vendidos</h3>
        {topProd.map((p, i) => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <span style={{ width: 16, fontSize: 11, color: "#6b7280", fontWeight: 700, flexShrink: 0 }}>#{i + 1}</span>
            <span style={{ flex: 1, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</span>
            <div style={{ width: 70, background: "#1e1e38", borderRadius: 99, height: 6, flexShrink: 0 }}>
              <div style={{ width: `${(getQtd(p) / maxQtd) * 100}%`, height: "100%", background: "linear-gradient(90deg,#a855f7,#7c3aed)", borderRadius: 99 }} />
            </div>
            <span style={{ width: 22, textAlign: "right", fontSize: 13, color: "#c084fc", fontWeight: 700, flexShrink: 0 }}>{getQtd(p)}</span>
          </div>
        ))}
      </Card>

      {alerta.length > 0 && (
        <Card style={{ border: "1px solid #ef444433" }}>
          <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#ef4444", textTransform: "uppercase", letterSpacing: 1 }}>⚠️ Estoque em Alerta</h3>
          {alerta.map(p => (
            <Row key={p.id}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 14, color: "#e2e8f0", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</span>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <Badge status={p.estoque === 0 ? "critico" : "baixo"} map={{ critico: "Crítico", baixo: "Baixo" }} />
                  <div style={{ fontSize: 11, color: "#6b7280", marginTop: 4 }}>{p.estoque} / mín {p.estoqueMin}</div>
                </div>
              </div>
            </Row>
          ))}
        </Card>
      )}
    </div>
  );
}

// ─── PRODUTOS ─────────────────────────────────────────────────────────────────
function Produtos({ db, commit }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [movModal, setMovModal] = useState(null);
  const [movForm, setMovForm] = useState({ tipo: "entrada", qtd: 1, obs: "", custo: "" });
  const [scanTarget, setScanTarget] = useState(null); // 'search' | 'form' | 'mov'
  const [scanMov, setScanMov] = useState(false);

  const handleScanResult = (code) => {
    if (scanTarget === 'search') {
      setSearch(code);
    } else if (scanTarget === 'form') {
      setForm(f => ({ ...f, codigoBarras: code }));
    }
    setScanTarget(null);
  };

  const handleScanMov = (code) => {
    setScanMov(false);
    const p = db.produtos.find(x => x.ativo && (x.codigoBarras === code || x.codigo === code));
    if (!p) { alert("Produto não encontrado: " + code); return; }
    setMovModal(p);
    setMovForm({ tipo: "entrada", qtd: 1, obs: "", custo: p.custo || "" });
  };

  const filtered = db.produtos.filter(p =>
    p.nome.toLowerCase().includes(search.toLowerCase()) ||
    (p.codigo || "").toLowerCase().includes(search.toLowerCase()) ||
    (p.categoria || "").toLowerCase().includes(search.toLowerCase()) ||
    (p.codigoBarras || "").includes(search)
  );

  const save = () => {
    if (!form.nome || !form.preco) return;
    commit(db => {
      if (modal === "new") { const id = db.nextId.produtos++; db.produtos.push({ ...form, id, preco: +form.preco, custo: +form.custo || 0, estoque: +form.estoque || 0, estoqueMin: +form.estoqueMin || 0 }); }
      else { const idx = db.produtos.findIndex(p => p.id === form.id); if (idx >= 0) db.produtos[idx] = { ...form, preco: +form.preco, custo: +form.custo || 0, estoqueMin: +form.estoqueMin || 0 }; }
      return db;
    });
    setModal(null);
  };

  const saveMov = () => {
    if (!movForm.qtd || movForm.qtd <= 0) return;
    const p = movModal;
    commit(db => {
      const idx = db.produtos.findIndex(x => x.id === p.id);
      const delta = movForm.tipo === "entrada" ? +movForm.qtd : -(+movForm.qtd);
      db.produtos[idx].estoque = Math.max(0, db.produtos[idx].estoque + delta);
      db.movimentos.push({ id: db.nextId.movimentos++, tipo: movForm.tipo, produtoId: p.id, qtd: +movForm.qtd, data: today(), obs: movForm.obs, custo: +movForm.custo || 0 });
      return db;
    });
    setMovModal(null);
  };

  const toggle = p => commit(db => { const i = db.produtos.findIndex(x => x.id === p.id); db.produtos[i].ativo = !db.produtos[i].ativo; return db; });

  return (
    <div>
      <PageHeader title="Produtos" subtitle={`${db.produtos.filter(p => p.ativo).length} ativos`}
        action={
          <div style={{ display: "flex", gap: 8 }}>
            <Btn variant="secondary" small onClick={() => setScanMov(true)}>📷 Mov.</Btn>
            <Btn onClick={() => { setForm({ ativo: true, estoque: 0, estoqueMin: 3 }); setModal("new"); }}>+ Novo</Btn>
          </div>
        } />
      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar por nome, código ou EAN..." style={{ flex: 1, background: "#12122a", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14 }} />
        <button onClick={() => setScanTarget('search')} title="Escanear" style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 8, padding: "0 14px", color: "#fff", fontSize: 20, cursor: "pointer" }}>📷</button>
      </div>

      {filtered.map(p => (
        <Row key={p.id}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>{p.categoria}{p.codigo ? ` · ${p.codigo}` : ""}{p.codigoBarras ? ` · 🔲 ${p.codigoBarras}` : ""}</div>
              <div style={{ display: "flex", gap: 12, marginTop: 6, flexWrap: "wrap" }}>
                <span style={{ fontSize: 15, fontWeight: 800, color: "#a855f7" }}>{fmt(p.preco)}</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: p.estoque === 0 ? "#ef4444" : p.estoque <= p.estoqueMin ? "#f59e0b" : "#22c55e" }}>Est: {p.estoque}</span>
              </div>
            </div>
            <Badge status={p.ativo ? "ok" : "cancelado"} map={{ ok: "Ativo", cancelado: "Inativo" }} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
            <Btn small variant="ghost" onClick={() => { setMovModal(p); setMovForm({ tipo: "entrada", qtd: 1, obs: "", custo: p.custo }); }}>📦 Mov.</Btn>
            <Btn small variant="secondary" onClick={() => { setForm({ ...p }); setModal("edit"); }}>✏️ Editar</Btn>
            <Btn small variant={p.ativo ? "danger" : "success"} onClick={() => toggle(p)}>{p.ativo ? "Desativar" : "Ativar"}</Btn>
          </div>
        </Row>
      ))}

      {modal && (
        <Modal title={modal === "new" ? "Novo Produto" : "Editar Produto"} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Input label="Nome do Produto *" value={form.nome || ""} onChange={e => setForm({ ...form, nome: e.target.value })} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Código / SKU" value={form.codigo || ""} onChange={e => setForm({ ...form, codigo: e.target.value })} />
              <Sel label="Categoria" value={form.categoria || ""} onChange={e => setForm({ ...form, categoria: e.target.value })}>
                <option value="">Selecione...</option>
                {CATEGORIAS.map(c => <option key={c}>{c}</option>)}
              </Sel>
              <Input label="Preço Venda (R$) *" type="number" step="0.01" value={form.preco || ""} onChange={e => setForm({ ...form, preco: e.target.value })} />
              <Input label="Custo (R$)" type="number" step="0.01" value={form.custo || ""} onChange={e => setForm({ ...form, custo: e.target.value })} />
              {modal === "new" && <Input label="Estoque Inicial" type="number" value={form.estoque || 0} onChange={e => setForm({ ...form, estoque: e.target.value })} />}
              <Input label="Estoque Mínimo" type="number" value={form.estoqueMin || 0} onChange={e => setForm({ ...form, estoqueMin: e.target.value })} />
            </div>
            <BarcodeInput
              label="Código de Barras (EAN)"
              value={form.codigoBarras || ""}
              onChange={e => setForm({ ...form, codigoBarras: e.target.value })}
              placeholder="Ex: 7891234567890"
              onScan={() => setScanTarget('form')}
            />
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setModal(null)}>Cancelar</Btn>
              <Btn full onClick={save}>Salvar</Btn>
            </div>
          </div>
        </Modal>
      )}

      {scanTarget && (
        <BarcodeScannerModal
          title={scanTarget === 'search' ? "Buscar por código de barras" : "Escanear código do produto"}
          onDetected={handleScanResult}
          onClose={() => setScanTarget(null)}
        />
      )}

      {scanMov && (
        <BarcodeScannerModal
          title="Escanear produto para movimentação"
          onDetected={handleScanMov}
          onClose={() => setScanMov(false)}
        />
      )}

      {movModal && (
        <Modal title={`Movimentação de Estoque`} onClose={() => setMovModal(null)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <p style={{ margin: 0, fontSize: 14, fontWeight: 700, color: "#c084fc", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{movModal.nome}</p>
            <button onClick={() => { setMovModal(null); setScanMov(true); }} title="Trocar produto escaneando" style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 8, padding: "7px 12px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5, flexShrink: 0, marginLeft: 10 }}>📷 Trocar</button>
          </div>
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            {["entrada", "saida", "baixa"].map(t => (
              <button key={t} onClick={() => setMovForm({ ...movForm, tipo: t })} style={{ flex: 1, padding: "10px 4px", borderRadius: 8, border: "1px solid", borderColor: movForm.tipo === t ? "#a855f7" : "#2d2d4a", background: movForm.tipo === t ? "#a855f722" : "#12122a", color: movForm.tipo === t ? "#c084fc" : "#6b7280", cursor: "pointer", fontWeight: 700, fontSize: 12, fontFamily: "inherit" }}>
                {t === "entrada" ? "📥 Entrada" : t === "saida" ? "📤 Saída" : "🗑️ Baixa"}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Input label="Quantidade *" type="number" min="1" value={movForm.qtd} onChange={e => setMovForm({ ...movForm, qtd: e.target.value })} />
            {movForm.tipo === "entrada" && <Input label="Custo Unitário (R$)" type="number" step="0.01" value={movForm.custo} onChange={e => setMovForm({ ...movForm, custo: e.target.value })} />}
            <Input label="Observação" value={movForm.obs} onChange={e => setMovForm({ ...movForm, obs: e.target.value })} />
            <p style={{ margin: 0, fontSize: 12, color: "#6b7280" }}>Estoque atual: <b style={{ color: "#c084fc" }}>{movModal.estoque}</b></p>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setMovModal(null)}>Cancelar</Btn>
              <Btn full onClick={saveMov}>Registrar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function Clientes({ db, commit }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});

  const filtered = db.clientes.filter(c =>
    c.nome.toLowerCase().includes(search.toLowerCase()) ||
    (c.telefone || "").includes(search) ||
    (c.email || "").toLowerCase().includes(search.toLowerCase())
  );

  const save = () => {
    if (!form.nome) return;
    commit(db => {
      if (modal === "new") { const id = db.nextId.clientes++; db.clientes.push({ ...form, id, ativo: true }); }
      else { const idx = db.clientes.findIndex(c => c.id === form.id); if (idx >= 0) db.clientes[idx] = form; }
      return db;
    });
    setModal(null);
  };

  return (
    <div>
      <PageHeader title="Clientes" subtitle={`${db.clientes.filter(c => c.ativo).length} cadastrados`}
        action={<Btn onClick={() => { setForm({ ativo: true }); setModal("new"); }}>+ Novo</Btn>} />
      <SearchBar value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Buscar cliente..." />

      {filtered.map(c => {
        const vendas = db.vendas.filter(v => v.clienteId === c.id && v.status !== "cancelado");
        const total = vendas.reduce((s, v) => s + v.itens.reduce((a, i) => a + i.qtd * i.preco, 0) - (v.desconto || 0), 0);
        return (
          <Row key={c.id}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg,#a855f7,#7c3aed)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, fontWeight: 800, color: "#fff", flexShrink: 0 }}>{c.nome.charAt(0)}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.nome}</div>
                  <Badge status={c.ativo ? "ok" : "cancelado"} map={{ ok: "Ativa", cancelado: "Inativa" }} />
                </div>
                {c.telefone && <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>📱 {c.telefone}</div>}
                {c.email && <div style={{ fontSize: 12, color: "#818cf8", marginTop: 1 }}>✉️ {c.email}</div>}
                <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
                  <span><b style={{ color: "#a855f7" }}>{vendas.length}</b> <span style={{ fontSize: 12, color: "#6b7280" }}>pedidos</span></span>
                  <span><b style={{ color: "#22c55e" }}>{fmt(total)}</b> <span style={{ fontSize: 12, color: "#6b7280" }}>total</span></span>
                </div>
              </div>
            </div>
            <div style={{ marginTop: 10 }}>
              <Btn small variant="secondary" onClick={() => { setForm({ ...c }); setModal("edit"); }}>✏️ Editar</Btn>
            </div>
          </Row>
        );
      })}

      {modal && (
        <Modal title={modal === "new" ? "Novo Cliente" : "Editar Cliente"} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <Input label="Nome Completo *" value={form.nome || ""} onChange={e => setForm({ ...form, nome: e.target.value })} />
            <Input label="Telefone / WhatsApp" value={form.telefone || ""} onChange={e => setForm({ ...form, telefone: e.target.value })} />
            <Input label="E-mail" type="email" value={form.email || ""} onChange={e => setForm({ ...form, email: e.target.value })} />
            <Input label="Data de Aniversário" type="date" value={form.aniversario || ""} onChange={e => setForm({ ...form, aniversario: e.target.value })} />
            <Input label="Endereço" value={form.endereco || ""} onChange={e => setForm({ ...form, endereco: e.target.value })} />
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setModal(null)}>Cancelar</Btn>
              <Btn full onClick={save}>Salvar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── VENDAS ───────────────────────────────────────────────────────────────────
function Vendas({ db, commit }) {
  const [filter, setFilter] = useState("todos");
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ clienteId: "", data: today(), pagamento: "pix", desconto: 0, frete: 0, itens: [], obs: "" });
  const [itemForm, setItemForm] = useState({ produtoId: "", qtd: 1 });
  const [detail, setDetail] = useState(null);
  const [scanVenda, setScanVenda] = useState(false);

  const handleScanVenda = (code) => {
    setScanVenda(false);
    const p = db.produtos.find(x => x.codigoBarras === code || x.codigo === code);
    if (!p) { alert("Produto não encontrado: " + code); return; }
    if (!p.ativo) { alert("Produto inativo."); return; }
    setForm(f => {
      const exists = f.itens.findIndex(i => i.produtoId === p.id);
      if (exists >= 0) {
        const itens = [...f.itens]; itens[exists] = { ...itens[exists], qtd: itens[exists].qtd + 1 };
        return { ...f, itens };
      }
      return { ...f, itens: [...f.itens, { produtoId: p.id, nome: p.nome, qtd: 1, preco: p.preco }] };
    });
  };

  // Filter chips — now filter by pago/entregue flags
  const filterFn = v => {
    if (filter === "todos")     return true;
    if (filter === "pendente")  return v.status !== "cancelado" && !v.pago && !v.entregue;
    if (filter === "pago")      return v.pago && v.status !== "cancelado";
    if (filter === "entregue")  return v.entregue && v.status !== "cancelado";
    if (filter === "cancelado") return v.status === "cancelado";
    return true;
  };
  const filtered = db.vendas.filter(filterFn).sort((a, b) => b.data?.localeCompare(a.data));

  const addItem = () => {
    const p = db.produtos.find(x => x.id === +itemForm.produtoId);
    if (!p || itemForm.qtd <= 0) return;
    const exists = form.itens.findIndex(i => i.produtoId === p.id);
    if (exists >= 0) { const itens = [...form.itens]; itens[exists].qtd += +itemForm.qtd; setForm({ ...form, itens }); }
    else setForm({ ...form, itens: [...form.itens, { produtoId: p.id, nome: p.nome, qtd: +itemForm.qtd, preco: p.preco }] });
    setItemForm({ produtoId: "", qtd: 1 });
  };

  const total = form.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - +form.desconto + +form.frete;

  const save = () => {
    if (!form.clienteId || form.itens.length === 0) return;
    commit(db => {
      const id = db.nextId.vendas++;
      // Save venda with pago/entregue flags (replaces single status)
      db.vendas.push({ ...form, id, clienteId: +form.clienteId, desconto: +form.desconto, frete: +form.frete, status: "pendente", pago: false, entregue: false });
      // Baixa estoque + movimentos
      form.itens.forEach(it => {
        const idx = db.produtos.findIndex(p => p.id === it.produtoId);
        if (idx >= 0) db.produtos[idx].estoque = Math.max(0, db.produtos[idx].estoque - it.qtd);
        db.movimentos.push({ id: db.nextId.movimentos++, tipo: "saida", produtoId: it.produtoId, qtd: it.qtd, data: form.data, obs: `Venda #${id}`, custo: 0 });
      });
      // Auto-create empenho until delivered
      if (!db.nextId.empenhos) db.nextId.empenhos = 1;
      const empId = db.nextId.empenhos++;
      db.empenhos.push({ id: empId, clienteId: +form.clienteId, data: form.data, status: "ativo", obs: `Empenho automático — Venda #${id}`, dataRetirada: "", itens: form.itens.map(it => ({ ...it })), vendaId: id });
      return db;
    });
    setModal(false);
    setForm({ clienteId: "", data: today(), pagamento: "pix", desconto: 0, frete: 0, itens: [], obs: "" });
  };

  // Toggle pago independentemente de entregue
  const togglePago = v => commit(db => {
    const idx = db.vendas.findIndex(x => x.id === v.id);
    db.vendas[idx].pago = !db.vendas[idx].pago;
    return db;
  });

  // Toggle entregue — ao entregar, fecha empenho automático vinculado
  const toggleEntregue = v => commit(db => {
    const idx = db.vendas.findIndex(x => x.id === v.id);
    const novoEntregue = !db.vendas[idx].entregue;
    db.vendas[idx].entregue = novoEntregue;
    if (novoEntregue) {
      // Fechar empenho automático desta venda
      const ei = db.empenhos.findIndex(e => e.vendaId === v.id && e.status === "ativo");
      if (ei >= 0) db.empenhos[ei].status = "retirado";
    } else {
      // Reabrir empenho ao desmarcar entregue
      const ei = db.empenhos.findIndex(e => e.vendaId === v.id && e.status === "retirado");
      if (ei >= 0) db.empenhos[ei].status = "ativo";
    }
    return db;
  });

  const cancelarVenda = v => commit(db => {
    const idx = db.vendas.findIndex(x => x.id === v.id);
    if (db.vendas[idx].status === "cancelado") return db;
    db.vendas[idx].status = "cancelado";
    // Repor estoque
    v.itens.forEach(it => { const pi = db.produtos.findIndex(p => p.id === it.produtoId); if (pi >= 0) db.produtos[pi].estoque += it.qtd; });
    // Cancelar empenho vinculado
    const ei = db.empenhos.findIndex(e => e.vendaId === v.id && e.status === "ativo");
    if (ei >= 0) db.empenhos[ei].status = "cancelado";
    return db;
  });

  return (
    <div>
      <PageHeader title="Vendas" subtitle={`${db.vendas.length} pedidos`}
        action={<Btn onClick={() => setModal(true)}>+ Nova</Btn>} />

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
        {["todos", "pendente", "pago", "entregue", "cancelado"].map(s => (
          <button key={s} onClick={() => setFilter(s)} style={{ padding: "6px 12px", borderRadius: 20, border: "1px solid", borderColor: filter === s ? "#a855f7" : "#2d2d4a", background: filter === s ? "#a855f722" : "transparent", color: filter === s ? "#c084fc" : "#6b7280", cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit" }}>
            {s === "todos" ? "Todos" : STATUS_VENDA[s]}
          </button>
        ))}
      </div>

      {filtered.map(v => {
        const cli = db.clientes.find(c => c.id === v.clienteId);
        const vtotal = v.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - (v.desconto || 0) + (v.frete || 0);
        return (
          <Row key={v.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>#{v.id} — {cli?.nome ?? "—"}</div>
                <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>{fmtDate(v.data)} · {v.pagamento} · {v.itens.length} item(s)</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontWeight: 800, color: "#a855f7" }}>{fmt(vtotal)}</div>
                <div style={{ marginTop: 4 }}><VendaBadge v={v} /></div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
              <Btn small variant="ghost" onClick={() => setDetail(v)}>Ver</Btn>
              {v.status !== "cancelado" && <>
                <Btn small variant={v.pago ? "success" : "ghost"} onClick={() => togglePago(v)}>
                  {v.pago ? "✓ Pago" : "Pago?"}
                </Btn>
                <Btn small variant={v.entregue ? "secondary" : "ghost"} onClick={() => toggleEntregue(v)}>
                  {v.entregue ? "✓ Entregue" : "Entregue?"}
                </Btn>
                <Btn small variant="danger" onClick={() => cancelarVenda(v)}>×</Btn>
              </>}
            </div>
          </Row>
        );
      })}

      {modal && (
        <Modal title="Nova Venda" onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <SearchableSelect
              label="Cliente *"
              value={form.clienteId}
              onChange={v => setForm({ ...form, clienteId: v })}
              placeholder="Digite o nome do cliente…"
              options={db.clientes.filter(c => c.ativo).map(c => ({ value: c.id, label: c.nome }))}
            />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Data" type="date" value={form.data} onChange={e => setForm({ ...form, data: e.target.value })} />
              <Sel label="Pagamento" value={form.pagamento} onChange={e => setForm({ ...form, pagamento: e.target.value })}>
                {PAGAMENTOS.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)}</option>)}
              </Sel>
            </div>

            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12, border: "1px solid #1e1e38" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <p style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase" }}>Produtos</p>
                <button onClick={() => setScanVenda(true)} style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 7, padding: "6px 12px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>📷 Escanear</button>
              </div>
              <SearchableSelect
                value={itemForm.produtoId}
                onChange={v => setItemForm({ ...itemForm, produtoId: v })}
                placeholder="Digite o nome do produto…"
                options={db.produtos.filter(p => p.ativo).map(p => ({ value: p.id, label: `${p.nome} — ${fmt(p.preco)} (est: ${p.estoque})` }))}
              />
              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
                <input type="number" min="1" value={itemForm.qtd} onChange={e => setItemForm({ ...itemForm, qtd: +e.target.value })} style={{ width: 70, background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px", color: "#e2e8f0", fontSize: 15, textAlign: "center", flexShrink: 0 }} />
                <Btn full onClick={addItem}>+ Adicionar</Btn>
              </div>
              {form.itens.map((it, idx) => (
                <div key={idx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #1e1e38", marginTop: 6 }}>
                  <span style={{ fontSize: 13, color: "#e2e8f0", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
                    <span style={{ color: "#c084fc", fontWeight: 700, fontSize: 13 }}>{fmt(it.qtd * it.preco)}</span>
                    <button onClick={() => setForm({ ...form, itens: form.itens.filter((_, i) => i !== idx) })} style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 20 }}>×</button>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Input label="Desconto (R$)" type="number" step="0.01" value={form.desconto} onChange={e => setForm({ ...form, desconto: e.target.value })} />
              <Input label="Frete (R$)" type="number" step="0.01" value={form.frete} onChange={e => setForm({ ...form, frete: e.target.value })} />
            </div>
            <Input label="Observações" value={form.obs} onChange={e => setForm({ ...form, obs: e.target.value })} />

            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ color: "#9ca3af", fontWeight: 700 }}>Total</span>
              <span style={{ fontSize: 20, fontWeight: 800, color: "#a855f7" }}>{fmt(total)}</span>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" full onClick={() => setModal(false)}>Cancelar</Btn>
              <Btn full onClick={save}>Registrar Venda</Btn>
            </div>
          </div>
        </Modal>
      )}

      {scanVenda && (
        <BarcodeScannerModal
          title="Adicionar produto — escanear"
          onDetected={handleScanVenda}
          onClose={() => setScanVenda(false)}
        />
      )}

      {detail && (
        <Modal title={`Venda #${detail.id}`} onClose={() => setDetail(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              {[
                { l: "Cliente", v: db.clientes.find(c => c.id === detail.clienteId)?.nome },
                { l: "Data", v: fmtDate(detail.data) },
                { l: "Pagamento", v: detail.pagamento },
                { l: "Status", v: <VendaBadge v={detail} /> },
              ].map(x => (
                <div key={x.l}><p style={{ margin: "0 0 2px", fontSize: 11, color: "#6b7280", textTransform: "uppercase" }}>{x.l}</p><p style={{ margin: 0, fontWeight: 700, color: "#e2e8f0" }}>{x.v}</p></div>
              ))}
            </div>
            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12 }}>
              {detail.itens.map((it, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: i < detail.itens.length - 1 ? "1px solid #1e1e38" : "none" }}>
                  <span style={{ color: "#cbd5e1", fontSize: 13, flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <span style={{ color: "#c084fc", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>{fmt(it.qtd * it.preco)}</span>
                </div>
              ))}
              {detail.desconto > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderTop: "1px solid #1e1e38" }}><span style={{ color: "#f59e0b", fontSize: 13 }}>Desconto</span><span style={{ color: "#f59e0b", fontSize: 13 }}>-{fmt(detail.desconto)}</span></div>}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 0", borderTop: "2px solid #2d2d4a", marginTop: 4 }}>
                <span style={{ fontWeight: 800, color: "#e2e8f0" }}>TOTAL</span>
                <span style={{ fontWeight: 800, color: "#a855f7", fontSize: 18 }}>{fmt(detail.itens.reduce((s, i) => s + i.qtd * i.preco, 0) - (detail.desconto || 0) + (detail.frete || 0))}</span>
              </div>
            </div>
            {detail.obs && <p style={{ margin: 0, fontSize: 13, color: "#6b7280", background: "#0a0a1a", padding: 12, borderRadius: 8 }}>💬 {detail.obs}</p>}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── EMPENHOS ─────────────────────────────────────────────────────────────────
function Empenhos({ db, commit }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ clienteId: "", data: today(), dataRetirada: "", obs: "", itens: [] });
  const [itemForm, setItemForm] = useState({ produtoId: "", qtd: 1 });

  const addItem = () => {
    const p = db.produtos.find(x => x.id === +itemForm.produtoId);
    if (!p) return;
    const exists = form.itens.findIndex(i => i.produtoId === p.id);
    if (exists >= 0) { const itens = [...form.itens]; itens[exists].qtd += +itemForm.qtd; setForm({ ...form, itens }); }
    else setForm({ ...form, itens: [...form.itens, { produtoId: p.id, nome: p.nome, qtd: +itemForm.qtd, preco: p.preco }] });
    setItemForm({ produtoId: "", qtd: 1 });
  };

  const save = () => {
    if (!form.clienteId || form.itens.length === 0) return;
    commit(db => { const id = db.nextId.empenhos++; db.empenhos.push({ ...form, id, clienteId: +form.clienteId, status: "ativo" }); return db; });
    setModal(false); setForm({ clienteId: "", data: today(), dataRetirada: "", obs: "", itens: [] });
  };

  const converter = e => commit(db => {
    db.empenhos.find(x => x.id === e.id).status = "retirado";
    const vid = db.nextId.vendas++;
    db.vendas.push({ id: vid, clienteId: e.clienteId, data: today(), status: "pendente", pagamento: "pix", desconto: 0, frete: 0, itens: e.itens, obs: `Empenho #${e.id}` });
    e.itens.forEach(it => { const pi = db.produtos.findIndex(p => p.id === it.produtoId); if (pi >= 0) db.produtos[pi].estoque = Math.max(0, db.produtos[pi].estoque - it.qtd); });
    return db;
  });

  const cancelar = e => commit(db => { db.empenhos.find(x => x.id === e.id).status = "cancelado"; return db; });

  return (
    <div>
      <PageHeader title="Empenhos" subtitle="Reservas para clientes"
        action={<Btn onClick={() => setModal(true)}>+ Novo</Btn>} />

      {[...db.empenhos].sort((a, b) => b.data?.localeCompare(a.data)).map(e => {
        const cli = db.clientes.find(c => c.id === e.clienteId);
        const total = e.itens.reduce((s, i) => s + i.qtd * i.preco, 0);
        return (
          <Row key={e.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>Empenho #{e.id}</div>
                <div style={{ fontSize: 13, color: "#818cf8", marginTop: 1 }}>{cli?.nome}</div>
                <div style={{ fontSize: 12, color: "#6b7280", marginTop: 1 }}>📅 {fmtDate(e.data)}{e.dataRetirada ? ` → ${fmtDate(e.dataRetirada)}` : ""}</div>
              </div>
              <Badge status={e.status} map={STATUS_EMP} />
            </div>
            <div style={{ margin: "10px 0 6px", borderTop: "1px solid #1e1e38", paddingTop: 8 }}>
              {e.itens.map((it, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                  <span style={{ color: "#cbd5e1", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", marginRight: 8 }}>{it.nome} × {it.qtd}</span>
                  <span style={{ color: "#c084fc", fontWeight: 600, flexShrink: 0 }}>{fmt(it.qtd * it.preco)}</span>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
              <span style={{ fontWeight: 800, color: "#a855f7", fontSize: 15 }}>{fmt(total)}</span>
              {e.status === "ativo" && (
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn small variant="success" onClick={() => converter(e)}>→ Venda</Btn>
                  <Btn small variant="danger" onClick={() => cancelar(e)}>× Cancelar</Btn>
                </div>
              )}
            </div>
            {e.obs && <p style={{ margin: "8px 0 0", fontSize: 12, color: "#6b7280" }}>💬 {e.obs}</p>}
          </Row>
        );
      })}

      {modal && (
        <Modal title="Novo Empenho" onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <SearchableSelect
              label="Cliente *"
              value={form.clienteId}
              onChange={v => setForm({ ...form, clienteId: v })}
              placeholder="Digite o nome do cliente…"
              options={db.clientes.filter(c => c.ativo).map(c => ({ value: c.id, label: c.nome }))}
            />
            <Input label="Data Prevista de Retirada" type="date" value={form.dataRetirada} onChange={e => setForm({ ...form, dataRetirada: e.target.value })} />
            <div style={{ background: "#0a0a1a", borderRadius: 10, padding: 12, border: "1px solid #1e1e38" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <p style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase" }}>Produtos</p>
                <button onClick={() => setScanVenda(true)} style={{ background: "linear-gradient(135deg,#a855f7,#7c3aed)", border: "none", borderRadius: 7, padding: "6px 12px", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>📷 Escanear</button>
              </div>
              <SearchableSelect
                value={itemForm.produtoId}
                onChange={v => setItemForm({ ...itemForm, produtoId: v })}
                placeholder="Digite o nome do produto…"
                options={db.produtos.filter(p => p.ativo).map(p => ({ value: p.id, label: `${p.nome} — ${fmt(p.preco)}` }))}
              />
              <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
