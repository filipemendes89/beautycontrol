// ─── GOOGLE DRIVE SYNC ───────────────────────────────────────────────────────
//
// Auth:    Google Identity Services (OAuth popup — no keys exposed)
// File:    My Drive / BeautyControl / beautycontrol-data.json
// Trigger: every commit() via debounce (300 ms) — local always wins
//
// Setup (one-time, free):
//   1. console.cloud.google.com → new project → Enable "Google Drive API"
//   2. APIs & Services → OAuth consent screen → External → add your email
//   3. Credentials → Create OAuth client ID → Web application
//   4. Authorised JavaScript origins → add your GitHub Pages URL
//   5. Copy the Client ID → paste in Backup settings inside the app

const DRIVE_FOLDER   = "BeautyControl";
const DRIVE_FILE     = "beautycontrol-data.json";
const DRIVE_SCOPE    = "https://www.googleapis.com/auth/drive.file";
const GIS_URL        = "https://accounts.google.com/gsi/client";
const GAPI_URL       = "https://apis.google.com/js/api.js";
const PUSH_DEBOUNCE  = 300; // ms — coalesce rapid commits into one upload

// ── useDriveSync ─────────────────────────────────────────────────────────────
function useDriveSync(syncListenerRef) {
  const [clientId, setClientId]   = useState(() => localStorage.getItem("bc_gclient") || "");
  const [status, setStatus]       = useState("disconnected"); // disconnected|connecting|ready|syncing|error
  const [statusMsg, setStatusMsg] = useState("");
  const [lastSync, setLastSync]   = useState(() => localStorage.getItem("bc_lastsync") || null);

  const tokenRef    = useRef(null);  // { value, expiresAt }
  const clientRef   = useRef(null);  // GIS TokenClient
  const fileIdRef   = useRef(null);  // cached Drive file ID
  const folderIdRef = useRef(null);  // cached Drive folder ID
  const tokenWait   = useRef(null);  // { resolve, reject } for pending getToken
  const debounceRef = useRef(null);  // setTimeout handle for push debounce
  const pushRunning = useRef(false); // prevent concurrent pushes
  const readyRef    = useRef(false); // true once successfully connected

  // ── Lazy-load GIS + GAPI ──────────────────────────────────────────────────
  const loadScripts = useCallback(async () => {
    if (!window.google?.accounts?.oauth2) {
      await new Promise((ok, fail) => {
        const s = document.createElement("script");
        s.src = GIS_URL; s.onload = ok;
        s.onerror = () => fail(new Error("Falha ao carregar Google Identity Services"));
        document.head.appendChild(s);
      });
    }
    if (!window.gapi?.client) {
      await new Promise((ok, fail) => {
        const s = document.createElement("script");
        s.src = GAPI_URL; s.onload = ok;
        s.onerror = () => fail(new Error("Falha ao carregar Google API"));
        document.head.appendChild(s);
      });
      await new Promise(ok => window.gapi.load("client", ok));
      await window.gapi.client.init({});
    }
  }, []);

  // ── Get token (reuse if valid, silently refresh otherwise) ────────────────
  const getToken = useCallback(() => new Promise((resolve, reject) => {
    const t = tokenRef.current;
    if (t && Date.now() < t.expiresAt - 30_000) return resolve(t.value);
    if (!clientRef.current) return reject(new Error("Drive não conectado"));
    tokenWait.current = { resolve, reject };
    clientRef.current.requestAccessToken({ prompt: "" }); // silent refresh
  }), []);

  // ── Init GIS token client ─────────────────────────────────────────────────
  const initTokenClient = useCallback((cid) => {
    clientRef.current = window.google.accounts.oauth2.initTokenClient({
      client_id: cid,
      scope: DRIVE_SCOPE,
      callback: (resp) => {
        if (resp.error) {
          const err = new Error("Auth error: " + resp.error);
          setStatus("error"); setStatusMsg("Autenticação falhou: " + resp.error);
          if (tokenWait.current) { tokenWait.current.reject(err); tokenWait.current = null; }
          return;
        }
        tokenRef.current = { value: resp.access_token, expiresAt: Date.now() + resp.expires_in * 1000 };
        window.gapi.client.setToken({ access_token: resp.access_token });
        if (tokenWait.current) { tokenWait.current.resolve(resp.access_token); tokenWait.current = null; }
        // First successful token = connected
        if (!readyRef.current) { readyRef.current = true; setStatus("ready"); setStatusMsg(""); }
      },
    });
  }, []);

  // ── Drive REST helpers ────────────────────────────────────────────────────
  const driveReq = useCallback(async (method, path, { params, body, upload, rawBody } = {}) => {
    const token  = await getToken();
    const base   = upload
      ? "https://www.googleapis.com/upload/drive/v3/"
      : "https://www.googleapis.com/drive/v3/";
    const qs     = params ? "?" + new URLSearchParams(params) : "";
    const headers = { Authorization: "Bearer " + token };
    if (body && !rawBody) headers["Content-Type"] = "application/json";
    const res = await fetch(base + path + qs, {
      method,
      headers,
      body: rawBody ? rawBody : body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => res.status);
      throw new Error(`Drive ${method} ${path} → ${res.status}: ${txt}`);
    }
    return res.status === 204 ? null : res.json();
  }, [getToken]);

  // Find-or-create the BeautyControl folder
  const getFolder = useCallback(async () => {
    if (folderIdRef.current) return folderIdRef.current;
    const res = await driveReq("GET", "files", {
      params: { q: `name='${DRIVE_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, fields: "files(id)" }
    });
    if (res.files.length) { folderIdRef.current = res.files[0].id; return folderIdRef.current; }
    const f = await driveReq("POST", "files", { body: { name: DRIVE_FOLDER, mimeType: "application/vnd.google-apps.folder" } });
    folderIdRef.current = f.id;
    return f.id;
  }, [driveReq]);

  // Find the backup file
  const getFileId = useCallback(async (folderId) => {
    if (fileIdRef.current) return fileIdRef.current;
    const res = await driveReq("GET", "files", {
      params: { q: `name='${DRIVE_FILE}' and '${folderId}' in parents and trashed=false`, fields: "files(id)" }
    });
    fileIdRef.current = res.files[0]?.id || null;
    return fileIdRef.current;
  }, [driveReq]);

  // ── PUSH — write local → Drive (local always wins) ───────────────────────
  const push = useCallback(async (dbSnapshot) => {
    if (!readyRef.current) return; // not connected
    if (pushRunning.current) return; // already running
    pushRunning.current = true;
    setStatus("syncing");

    try {
      const payload = JSON.stringify({
        _meta: { app: "BeautyControl", syncedAt: new Date().toISOString() },
        ...dbSnapshot,
      });

      const folderId = await getFolder();
      const fileId   = await getFileId(folderId);

      if (fileId) {
        // Update existing file content
        const token = await getToken();
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
          method: "PATCH",
          headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
          body: payload,
        });
      } else {
        // Create new file (multipart)
        const token  = await getToken();
        const meta   = JSON.stringify({ name: DRIVE_FILE, parents: [folderId] });
        const boundary = "bc_boundary_" + Date.now();
        const body = [
          `--${boundary}`,
          "Content-Type: application/json; charset=UTF-8",
          "",
          meta,
          `--${boundary}`,
          "Content-Type: application/json",
          "",
          payload,
          `--${boundary}--`,
        ].join("\r\n");

        const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
          method: "POST",
          headers: { Authorization: "Bearer " + token, "Content-Type": `multipart/related; boundary=${boundary}` },
          body,
        });
        const f = await res.json();
        fileIdRef.current = f.id;
      }

      const ts = new Date().toISOString();
      setLastSync(ts);
      localStorage.setItem("bc_lastsync", ts);
      setStatus("ready");
      setStatusMsg("");
    } catch (e) {
      setStatus("error");
      setStatusMsg(e.message || String(e));
      // Auto-retry after 10 s
      setTimeout(() => { if (readyRef.current) setStatus("ready"); }, 10_000);
    } finally {
      pushRunning.current = false;
    }
  }, [getFolder, getFileId, getToken]);

  // ── Debounced push — called on every commit() ─────────────────────────────
  const schedulePush = useCallback((dbSnapshot) => {
    clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => push(dbSnapshot), PUSH_DEBOUNCE);
  }, [push]);

  // ── Register listener so commit() triggers auto-push ─────────────────────
  useEffect(() => {
    syncListenerRef.current = schedulePush;
    return () => { syncListenerRef.current = null; };
  }, [schedulePush]);

  // ── Connect — open Google OAuth popup ────────────────────────────────────
  const connect = useCallback(async (cid) => {
    const id = (cid || clientId || localStorage.getItem("bc_gclient") || "").trim();
    if (!id) {
      setStatus("error");
      setStatusMsg("É necessário um Client ID para conectar ao Google Drive. Expanda a seção Configuração Avançada abaixo.");
      return;
    }
    setStatus("connecting"); setStatusMsg("Carregando Google…");
    try {
      await loadScripts();
      initTokenClient(id);
      localStorage.setItem("bc_gclient", id);
      setClientId(id);
      setStatusMsg("Aguardando login…");
      // Opens the Google account chooser popup
      clientRef.current.requestAccessToken({ prompt: "consent" });
    } catch (e) {
      setStatus("error"); setStatusMsg(e.message || String(e));
    }
  }, [clientId, loadScripts, initTokenClient]);

  // ── Disconnect ────────────────────────────────────────────────────────────
  const disconnect = useCallback(() => {
    clearTimeout(debounceRef.current);
    if (tokenRef.current?.value && window.google?.accounts?.oauth2) {
      window.google.accounts.oauth2.revoke(tokenRef.current.value, () => {});
    }
    tokenRef.current = null; fileIdRef.current = null; folderIdRef.current = null;
    clientRef.current = null; readyRef.current = false;
    syncListenerRef.current = null;
    setStatus("disconnected"); setStatusMsg(""); setLastSync(null);
    localStorage.removeItem("bc_lastsync");
  }, []);

  // ── Auto-reconnect silently on mount if we have a stored client ID ────────
  useEffect(() => {
    const cid = localStorage.getItem("bc_gclient");
    if (!cid) return;
    setClientId(cid);
    // Load scripts and re-init client; token will be requested silently on next push
    loadScripts().then(() => {
      initTokenClient(cid);
      // Request a token silently (no prompt) to restore session
      if (clientRef.current) {
        tokenWait.current = {
          resolve: (tok) => { readyRef.current = true; setStatus("ready"); setStatusMsg(""); },
          reject:  () => { setStatus("disconnected"); },
        };
        clientRef.current.requestAccessToken({ prompt: "" });
      }
    }).catch(() => setStatus("disconnected"));
  }, []);

  return { clientId, status, statusMsg, lastSync, connect, disconnect };
}

// ─── BACKUP PAGE ──────────────────────────────────────────────────────────────
function Backup({ db, commit, syncListenerRef }) {
  const [restoreState, setRestoreState] = useState("idle");
  const [restoreMsg, setRestoreMsg]     = useState("");
  const [previewData, setPreviewData]   = useState(null);
  const [dragOver, setDragOver]         = useState(false);
  const [showAdvanced, setShowAdvanced] = useState(false);
  const [cidInput, setCidInput]         = useState("");

  const drive = useDriveSync(syncListenerRef);

  // Pre-fill input from stored value (set after first connect)
  useEffect(() => { if (drive.clientId) setCidInput(drive.clientId); }, [drive.clientId]);

  // ── Local export ──────────────────────────────────────────────────────────
  const doExport = () => {
    const blob = new Blob([JSON.stringify({ _meta: { app: "BeautyControl", exportedAt: new Date().toISOString() }, ...db }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `beautycontrol-${today()}.json`; a.click();
  };

  // ── Local restore ─────────────────────────────────────────────────────────
  const parseFile = file => {
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.produtos || !data.clientes) { setRestoreState("error"); setRestoreMsg("Arquivo inválido."); return; }
        setPreviewData(data); setRestoreState("confirm");
      } catch { setRestoreState("error"); setRestoreMsg("Erro ao ler o arquivo."); }
    };
    r.readAsText(file);
  };

  const confirmRestore = () => {
    try { const { _meta, ...clean } = previewData; commit(() => clean); setRestoreState("success"); setPreviewData(null); }
    catch { setRestoreState("error"); setRestoreMsg("Erro ao restaurar."); }
  };

  const reset = () => { setRestoreState("idle"); setPreviewData(null); setRestoreMsg(""); };

  // ── Status helpers ────────────────────────────────────────────────────────
  const SC = { disconnected: "#6b7280", connecting: "#f59e0b", ready: "#22c55e", syncing: "#3b82f6", error: "#ef4444" };
  const SL = { disconnected: "Desconectado", connecting: "Conectando…", ready: "Sincronizado", syncing: "Salvando…", error: "Erro" };
  const SI = { disconnected: "☁️", connecting: "⏳", ready: "✅", syncing: "🔄", error: "⚠️" };
  const connected = drive.status === "ready" || drive.status === "syncing" || drive.status === "connecting";

  const stats = [
    { label: "Produtos",   value: db.produtos.length,  icon: "💄" },
    { label: "Clientes",   value: db.clientes.length,   icon: "👥" },
    { label: "Vendas",     value: db.vendas.length,     icon: "🛒" },
    { label: "Movimentos", value: db.movimentos.length, icon: "📦" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <PageHeader title="Backup" subtitle="Local e Google Drive" />

      {/* ── GOOGLE DRIVE CARD ── */}
      <Card style={{ border: `1px solid ${SC[drive.status]}33` }}>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
          {/* Icon */}
          <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#4285f4,#34a853)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>☁️</div>

          <div style={{ flex: 1, minWidth: 0 }}>
            {/* Header row */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
              <h2 style={{ margin: 0, fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Google Drive</h2>
              <span style={{ background: SC[drive.status] + "22", color: SC[drive.status], border: `1px solid ${SC[drive.status]}44`, borderRadius: 20, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>
                {SI[drive.status]} {SL[drive.status]}
              </span>
            </div>

            {/* Last sync */}
            {drive.lastSync && connected && (
              <p style={{ margin: "0 0 10px", fontSize: 11, color: "#6b7280" }}>
                Último sync: {new Date(drive.lastSync).toLocaleString("pt-BR")}
              </p>
            )}

            {/* ── NOT CONNECTED ── */}
            {!connected && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <p style={{ margin: 0, fontSize: 13, color: "#9ca3af", lineHeight: 1.5 }}>
                  Salve seus dados automaticamente no Google Drive a cada alteração.
                </p>

                {/* Error banner */}
                {drive.status === "error" && drive.statusMsg && (
                  <div style={{ background: "#ef444411", border: "1px solid #ef444433", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#ef4444" }}>
                    ⚠️ {drive.statusMsg}
                  </div>
                )}

                {/* Primary action — no Client ID required upfront */}
                <Btn full onClick={() => drive.connect(cidInput)} style={{ fontSize: 15, padding: "12px 18px" }}>
                  <span style={{ fontSize: 18 }}>G</span> Entrar com Google
                </Btn>

                {/* Advanced — Client ID config (collapsed by default) */}
                <button
                  onClick={() => setShowAdvanced(v => !v)}
                  style={{ background: "none", border: "none", color: "#4b5563", fontSize: 12, cursor: "pointer", padding: "2px 0", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 4, alignSelf: "flex-start" }}>
                  {showAdvanced ? "▾" : "▸"} Configuração avançada (Client ID)
                </button>

                {showAdvanced && (
                  <div style={{ background: "#0a0a1a", border: "1px solid #1e1e38", borderRadius: 10, padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
                    <p style={{ margin: 0, fontSize: 12, color: "#9ca3af", lineHeight: 1.6 }}>
                      Normalmente não é necessário. Preencha apenas se aparecer um erro de "client_id inválido" ou se quiser usar seu próprio projeto Google Cloud.
                    </p>
                    <div style={{ display: "flex", gap: 8 }}>
                      <input
                        value={cidInput}
                        onChange={e => setCidInput(e.target.value)}
                        placeholder="…googleusercontent.com"
                        style={{ flex: 1, background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "9px 12px", color: "#e2e8f0", fontSize: 13, outline: "none", minWidth: 0 }}
                        onFocus={e => e.target.style.border = "1px solid #c084fc"}
                        onBlur={e => e.target.style.border = "1px solid #2d2d4a"}
                      />
                    </div>
                    <div style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.7 }}>
                      Para obter um Client ID próprio:<br />
                      1. <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer" style={{ color: "#818cf8" }}>console.cloud.google.com</a> → Criar projeto<br />
                      2. APIs → Biblioteca → ativar <b style={{ color: "#c084fc" }}>Google Drive API</b><br />
                      3. Credenciais → Criar ID OAuth → Aplicativo Web<br />
                      4. Origens JS → adicionar a URL do seu GitHub Pages<br />
                      5. Copiar o ID e colar acima
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── CONNECTED ── */}
            {connected && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ background: "#22c55e11", border: "1px solid #22c55e33", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#9ca3af", lineHeight: 1.6 }}>
                  ✅ Sync automático — dados salvos no Drive a cada alteração.
                </div>
                <p style={{ margin: 0, fontSize: 11, color: "#4b5563", textAlign: "center" }}>
                  📁 BeautyControl / {DRIVE_FILE}
                </p>
                <button onClick={drive.disconnect}
                  style={{ background: "none", border: "none", color: "#4b5563", fontSize: 12, cursor: "pointer", padding: "4px 0", fontFamily: "inherit", textAlign: "center" }}>
                  Desconectar
                </button>
              </div>
            )}
          </div>
        </div>
      </Card>

      {/* ── LOCAL EXPORT ── */}
      <Card>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#a855f7,#7c3aed)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>💾</div>
          <div style={{ flex: 1 }}>
            <h2 style={{ margin: "0 0 6px", fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Backup Local</h2>
            <p style={{ margin: "0 0 12px", fontSize: 13, color: "#6b7280", lineHeight: 1.5 }}>Baixa um arquivo .json com todos os dados.</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
              {stats.map(s => (
                <div key={s.label} style={{ background: "#0a0a1a", border: "1px solid #1e1e38", borderRadius: 8, padding: "6px 10px", display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 13 }}>{s.icon}</span>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 13, color: "#c084fc" }}>{s.value}</div>
                    <div style={{ fontSize: 10, color: "#4b5563", textTransform: "uppercase" }}>{s.label}</div>
                  </div>
                </div>
              ))}
            </div>
            <Btn full onClick={doExport}>⬇️ Baixar .json</Btn>
          </div>
        </div>
      </Card>

      {/* ── LOCAL RESTORE ── */}
      <Card>
        <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
          <div style={{ width: 44, height: 44, borderRadius: 12, background: "linear-gradient(135deg,#3b82f6,#1d4ed8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>📂</div>
          <div style={{ flex: 1 }}>
            <h2 style={{ margin: "0 0 6px", fontSize: 15, fontWeight: 800, color: "#e2e8f0" }}>Restaurar Backup</h2>
            <p style={{ margin: "0 0 12px", fontSize: 13, color: "#6b7280", lineHeight: 1.5 }}>
              Selecione um .json do BeautyControl. <span style={{ color: "#f59e0b" }}>⚠️ Dados atuais serão substituídos.</span>
            </p>
            {restoreState === "idle" && (
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={e => { e.preventDefault(); setDragOver(false); parseFile(e.dataTransfer.files[0]); }}
                onClick={() => document.getElementById("bk-file").click()}
                style={{ border: `2px dashed ${dragOver ? "#a855f7" : "#2d2d4a"}`, borderRadius: 10, padding: "22px 16px", textAlign: "center", cursor: "pointer", background: dragOver ? "#a855f711" : "#0a0a1a" }}>
                <div style={{ fontSize: 28, marginBottom: 6 }}>📁</div>
                <div style={{ fontWeight: 700, color: "#e2e8f0", fontSize: 14, marginBottom: 4 }}>Toque para selecionar</div>
                <div style={{ fontSize: 12, color: "#4b5563" }}>Arquivos .json do BeautyControl</div>
                <input id="bk-file" type="file" accept=".json" style={{ display: "none" }} onChange={e => parseFile(e.target.files[0])} />
              </div>
            )}
            {restoreState === "confirm" && previewData && (
              <div style={{ background: "#0a0a1a", border: "1px solid #f59e0b44", borderRadius: 10, padding: 14 }}>
                <p style={{ margin: "0 0 8px", fontWeight: 700, color: "#f59e0b", fontSize: 14 }}>⚠️ Confirmar Restauração</p>
                {previewData._meta?.exportedAt && <p style={{ margin: "0 0 10px", fontSize: 12, color: "#6b7280" }}>Exportado em: {new Date(previewData._meta.exportedAt).toLocaleString("pt-BR")}</p>}
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                  {[["Produtos", previewData.produtos?.length], ["Clientes", previewData.clientes?.length], ["Vendas", previewData.vendas?.length]].map(([l, v]) => (
                    <div key={l} style={{ background: "#12122a", border: "1px solid #1e1e38", borderRadius: 8, padding: "6px 12px" }}>
                      <div style={{ fontWeight: 800, fontSize: 15, color: "#3b82f6" }}>{v ?? 0}</div>
                      <div style={{ fontSize: 10, color: "#4b5563", textTransform: "uppercase" }}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn variant="ghost" full onClick={reset}>Cancelar</Btn>
                  <Btn variant="danger" full onClick={confirmRestore}>🔄 Restaurar</Btn>
                </div>
              </div>
            )}
            {restoreState === "success" && (
              <div style={{ background: "#22c55e11", border: "1px solid #22c55e44", borderRadius: 10, padding: 18, textAlign: "center" }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
                <div style={{ fontWeight: 800, color: "#22c55e", fontSize: 15, marginBottom: 8 }}>Restaurado com sucesso!</div>
                <Btn full variant="success" onClick={reset}>OK</Btn>
              </div>
            )}
            {restoreState === "error" && (
              <div style={{ background: "#ef444411", border: "1px solid #ef444444", borderRadius: 10, padding: 18, textAlign: "center" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>❌</div>
                <div style={{ color: "#ef4444", fontWeight: 700, marginBottom: 4 }}>Erro</div>
                <div style={{ color: "#9ca3af", fontSize: 13, marginBottom: 12 }}>{restoreMsg}</div>
                <Btn full variant="ghost" onClick={reset}>Tentar novamente</Btn>
              </div>
            )}
          </div>
        </div>
      </Card>
    </div>
  );
}


// ─── INVENTÁRIO ───────────────────────────────────────────────────────────────
// Fluxo: idle → contando (produto a produto) → revisão → confirmado
function Inventario({ db, commit }) {
  const mobile = useIsMobile();

  // inventário ativo em andamento (em memória até confirmar)
  const [fase, setFase] = useState("idle"); // idle | contando | revisao
  const [contagens, setContagens] = useState({}); // { produtoId: qtdContada }
  const [obs, setObs] = useState("");
  const [search, setSearch] = useState("");
  const [produtoAtual, setProdutoAtual] = useState(null); // id do produto em foco no modal de contagem
  const [inputQtd, setInputQtd] = useState("");
  const [historico, setHistorico] = useState(false);
  const [scanInv, setScanInv] = useState(false);

  const handleScanInv = (code) => {
    setScanInv(false);
    const p = db.produtos.find(x =>
      x.ativo && (x.codigoBarras === code || x.codigo === code)
    );
    if (!p) { alert("Produto não encontrado: " + code); return; }
    abrirContagem(p);
  };

  const produtosAtivos = db.produtos.filter(p => p.ativo);
  const inventariosPassados = [...(db.inventarios || [])].sort((a, b) => b.data?.localeCompare(a.data));

  // quantos produtos já foram contados
  const contados = Object.keys(contagens).length;
  const total = produtosAtivos.length;
  const progresso = total === 0 ? 0 : Math.round((contados / total) * 100);

  // produtos filtrados pelo search na tela de contagem
  const filtrados = produtosAtivos.filter(p =>
    p.nome.toLowerCase().includes(search.toLowerCase()) ||
    (p.codigo || "").toLowerCase().includes(search.toLowerCase()) ||
    (p.categoria || "").toLowerCase().includes(search.toLowerCase())
  );

  const iniciar = () => {
    setContagens({});
    setObs("");
    setSearch("");
    setFase("contando");
  };

  const abrirContagem = (p) => {
    const atual = contagens[p.id];
    setInputQtd(atual !== undefined ? String(atual) : "");
    setProdutoAtual(p);
  };

  const salvarContagem = () => {
    if (inputQtd === "" || inputQtd === null) return;
    setContagens(prev => ({ ...prev, [produtoAtual.id]: Math.max(0, parseInt(inputQtd, 10) || 0) }));
    setProdutoAtual(null);
    setInputQtd("");
  };

  const removerContagem = (prodId) => {
    setContagens(prev => { const n = { ...prev }; delete n[prodId]; return n; });
  };

  // resumo para tela de revisão
  const itensRevisao = produtosAtivos.map(p => {
    const contado = contagens[p.id];
    const diferenca = contado !== undefined ? contado - p.estoque : null;
    return { ...p, contado, diferenca };
  }).filter(p => p.contado !== undefined);

  const itensNaoContados = produtosAtivos.filter(p => contagens[p.id] === undefined);

  const confirmar = () => {
    commit(db => {
      const id = db.nextId.inventarios == null ? 1 : db.nextId.inventarios++;
      if (!db.inventarios) db.inventarios = [];

      const itens = itensRevisao.map(p => ({
        produtoId: p.id,
        nome: p.nome,
        estoqueAntes: p.estoque,
        contado: p.contado,
        diferenca: p.diferenca,
      }));

      // Ajustar estoques e gerar movimentos
      itens.forEach(item => {
        const idx = db.produtos.findIndex(p => p.id === item.produtoId);
        if (idx < 0) return;
        db.produtos[idx].estoque = item.contado;
        if (item.diferenca !== 0) {
          const mid = db.nextId.movimentos++;
          db.movimentos.push({
            id: mid,
            tipo: item.diferenca > 0 ? "entrada" : "baixa",
            produtoId: item.produtoId,
            qtd: Math.abs(item.diferenca),
            data: today(),
            obs: `Ajuste de inventário #${id}`,
            custo: 0,
          });
        }
      });

      db.inventarios.push({
        id,
        data: today(),
        obs,
        itens,
        naoContados: itensNaoContados.map(p => p.id),
        totalProdutos: produtosAtivos.length,
        totalContados: itens.length,
      });

      return db;
    });

    setFase("idle");
    setContagens({});
    setObs("");
  };

  const cancelar = () => { setFase("idle"); setContagens({}); setObs(""); };

  // ── Tela idle ──
  if (fase === "idle") {
    return (
      <div>
        <PageHeader title="Inventário" subtitle="Contagem física de estoque" />

        <Card style={{ marginBottom: 20, textAlign: "center", padding: "28px 20px" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
          <h2 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 800, color: "#e2e8f0" }}>Novo Inventário</h2>
          <p style={{ margin: "0 0 20px", fontSize: 13, color: "#6b7280", lineHeight: 1.6, maxWidth: 340, marginLeft: "auto", marginRight: "auto" }}>
            Conte fisicamente cada produto e registre a quantidade real. O sistema irá calcular as diferenças e ajustar o estoque automaticamente.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
            {[
              { icon: "1️⃣", label: "Conte produto a produto" },
              { icon: "2️⃣", label: "Revise as diferenças" },
              { icon: "3️⃣", label: "Confirme o ajuste" },
            ].map(s => (
              <div key={s.label} style={{ background: "#0a0a1a", border: "1px solid #1e1e38", borderRadius: 10, padding: "12px 8px" }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
                <div style={{ fontSize: 11, color: "#9ca3af", lineHeight: 1.4 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <Btn full onClick={iniciar}>🚀 Iniciar Inventário</Btn>
        </Card>

        {/* Histórico */}
        {inventariosPassados.length > 0 && (
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ margin: 0, fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1 }}>Histórico de Inventários</h3>
              <button onClick={() => setHistorico(v => !v)} style={{ background: "none", border: "none", color: "#6b7280", cursor: "pointer", fontSize: 12 }}>{historico ? "Recolher ▲" : "Ver todos ▼"}</button>
            </div>
            {(historico ? inventariosPassados : inventariosPassados.slice(0, 3)).map(inv => {
              const ajustes = inv.itens.filter(i => i.diferenca !== 0).length;
              const positivos = inv.itens.filter(i => i.diferenca > 0).length;
              const negativos = inv.itens.filter(i => i.diferenca < 0).length;
              return (
                <Row key={inv.id}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: "#e2e8f0" }}>Inventário #{inv.id}</div>
                      <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>
                        📅 {fmtDate(inv.data)} · {inv.totalContados}/{inv.totalProdutos} produtos contados
                      </div>
                      {inv.obs && <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2 }}>💬 {inv.obs}</div>}
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      {ajustes === 0
                        ? <Badge status="ok" map={{ ok: "Sem ajustes" }} />
                        : <Badge status="pendente" map={{ pendente: `${ajustes} ajuste(s)` }} />
                      }
                      {ajustes > 0 && (
                        <div style={{ fontSize: 11, marginTop: 4, display: "flex", gap: 6, justifyContent: "flex-end" }}>
                          {positivos > 0 && <span style={{ color: "#22c55e" }}>+{positivos}</span>}
                          {negativos > 0 && <span style={{ color: "#ef4444" }}>-{negativos}</span>}
                        </div>
                      )}
                    </div>
                  </div>
                </Row>
              );
            })}
          </Card>
        )}
      </div>
    );
  }

  // ── Tela de revisão ──
  if (fase === "revisao") {
    const totalDif = itensRevisao.reduce((s, p) => s + Math.abs(p.diferenca || 0), 0);
    const comDif = itensRevisao.filter(p => p.diferenca !== 0).length;
    return (
      <div>
        <PageHeader title="Revisão do Inventário" subtitle="Confirme os ajustes antes de aplicar" />

        {/* Resumo */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
          <Card style={{ padding: "12px 14px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#a855f7" }}>{itensRevisao.length}</div>
            <div style={{ fontSize: 11, color: "#6b7280" }}>Produtos contados</div>
          </Card>
          <Card style={{ padding: "12px 14px" }}>
            <div style={{ fontSize: 20, fontWeight: 800, color: comDif > 0 ? "#f59e0b" : "#22c55e" }}>{comDif}</div>
            <div style={{ fontSize: 11, color: "#6b7280" }}>Com diferença</div>
          </Card>
          {itensNaoContados.length > 0 && (
            <Card style={{ padding: "12px 14px", gridColumn: "1/-1", border: "1px solid #f59e0b33" }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#f59e0b" }}>⚠️ {itensNaoContados.length} produto(s) não contado(s)</div>
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 4 }}>
                {itensNaoContados.map(p => p.nome).join(", ")}
              </div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 4 }}>O estoque desses produtos <b>não será alterado</b>.</div>
            </Card>
          )}
        </div>

        {/* Lista de diferenças */}
        {itensRevisao.filter(p => p.diferenca !== 0).length > 0 && (
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#f59e0b", textTransform: "uppercase", letterSpacing: 1 }}>⚡ Produtos com diferença</h3>
            {itensRevisao.filter(p => p.diferenca !== 0).map(p => (
              <Row key={p.id} style={{ borderColor: p.diferenca > 0 ? "#22c55e33" : "#ef444433" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                    <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>Sistema: {p.estoque} → Contado: {p.contado}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <span style={{ fontWeight: 800, fontSize: 16, color: p.diferenca > 0 ? "#22c55e" : "#ef4444" }}>
                      {p.diferenca > 0 ? "+" : ""}{p.diferenca}
                    </span>
                    <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{p.diferenca > 0 ? "sobra" : "falta"}</div>
                  </div>
                </div>
              </Row>
            ))}
          </Card>
        )}

        {itensRevisao.filter(p => p.diferenca === 0).length > 0 && (
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 12, fontWeight: 700, color: "#22c55e", textTransform: "uppercase", letterSpacing: 1 }}>✅ Produtos sem diferença</h3>
            {itensRevisao.filter(p => p.diferenca === 0).map(p => (
              <Row key={p.id}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: "#9ca3af", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</span>
                  <span style={{ fontSize: 13, color: "#22c55e", fontWeight: 700, flexShrink: 0 }}>{p.contado} un. ✓</span>
                </div>
              </Row>
            ))}
          </Card>
        )}

        <div style={{ marginBottom: 16 }}>
          <Input label="Observação do Inventário" value={obs} onChange={e => setObs(e.target.value)} placeholder="Ex: Inventário mensal, conferência de estoque..." />
        </div>

        {comDif > 0 && (
          <div style={{ background: "#f59e0b11", border: "1px solid #f59e0b33", borderRadius: 10, padding: "12px 14px", marginBottom: 14, fontSize: 13, color: "#f59e0b" }}>
            ⚠️ Ao confirmar, <b>{comDif} produto(s)</b> terão seu estoque ajustado automaticamente e serão gerados {comDif} movimento(s) de ajuste.
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          <Btn variant="ghost" full onClick={() => setFase("contando")}>← Voltar</Btn>
          <Btn variant="success" full onClick={confirmar}>✓ Confirmar Inventário</Btn>
        </div>
        <div style={{ marginTop: 10 }}>
          <Btn variant="danger" full onClick={cancelar}>× Cancelar e descartar</Btn>
        </div>
      </div>
    );
  }

  // ── Tela de contagem ──
  return (
    <div>
      {/* Header fixo com progresso */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#e2e8f0" }}>Contagem Física</h1>
            <p style={{ margin: "2px 0 0", color: "#6b7280", fontSize: 12 }}>{contados} de {total} produtos contados</p>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn small variant="ghost" onClick={cancelar}>Cancelar</Btn>
            <Btn small variant="secondary" onClick={() => setScanInv(true)}>📷 Scan</Btn>
            <Btn small onClick={() => setFase("revisao")} style={{ opacity: contados === 0 ? 0.5 : 1 }}>Revisar →</Btn>
          </div>
        </div>
        {/* Barra de progresso */}
        <div style={{ background: "#1e1e38", borderRadius: 99, height: 8 }}>
          <div style={{ width: `${progresso}%`, height: "100%", background: progresso === 100 ? "linear-gradient(90deg,#22c55e,#16a34a)" : "linear-gradient(90deg,#a855f7,#7c3aed)", borderRadius: 99, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ textAlign: "right", fontSize: 11, color: "#6b7280", marginTop: 4 }}>{progresso}% concluído</div>
      </div>

      <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Filtrar produto..." style={{ background: "#12122a", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 14px", color: "#e2e8f0", fontSize: 14, width: "100%", marginBottom: 12 }} />

      {/* Abas: Todos / Pendentes / Contados */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {["todos", "pendentes", "contados"].map(tab => {
          const counts = { todos: total, pendentes: total - contados, contados };
          return (
            <button key={tab} onClick={() => setSearch("")} style={{ flex: 1, padding: "7px 4px", borderRadius: 8, border: "1px solid #2d2d4a", background: "#12122a", color: "#6b7280", cursor: "pointer", fontSize: 11, fontWeight: 600, fontFamily: "inherit" }}>
              {tab.charAt(0).toUpperCase() + tab.slice(1)} ({counts[tab]})
            </button>
          );
        })}
      </div>

      {filtrados.length === 0 && (
        <div style={{ textAlign: "center", padding: "32px 16px", color: "#4b5563" }}>Nenhum produto encontrado.</div>
      )}

      {filtrados.map(p => {
        const contado = contagens[p.id];
        const foiContado = contado !== undefined;
        const diferenca = foiContado ? contado - p.estoque : null;
        return (
          <Row key={p.id} style={{ borderColor: foiContado ? (diferenca === 0 ? "#22c55e33" : diferenca > 0 ? "#3b82f633" : "#ef444433") : "#1e1e38" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {/* Status indicator */}
              <div style={{ width: 36, height: 36, borderRadius: 10, background: foiContado ? (diferenca === 0 ? "#22c55e22" : diferenca > 0 ? "#3b82f622" : "#ef444422") : "#1a1a2e", border: `2px solid ${foiContado ? (diferenca === 0 ? "#22c55e" : diferenca > 0 ? "#3b82f6" : "#ef4444") : "#2d2d4a"}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16 }}>
                {foiContado ? (diferenca === 0 ? "✓" : diferenca > 0 ? "↑" : "↓") : "?"}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.nome}</div>
                <div style={{ fontSize: 11, color: "#6b7280", marginTop: 1 }}>
                  {p.categoria}{p.codigo ? ` · ${p.codigo}` : ""} · Sistema: <b style={{ color: "#9ca3af" }}>{p.estoque}</b>
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                {foiContado ? (
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 16, color: diferenca === 0 ? "#22c55e" : diferenca > 0 ? "#3b82f6" : "#ef4444" }}>{contado}</div>
                    {diferenca !== 0 && (
                      <div style={{ fontSize: 11, fontWeight: 700, color: diferenca > 0 ? "#22c55e" : "#ef4444" }}>{diferenca > 0 ? "+" : ""}{diferenca}</div>
                    )}
                  </div>
                ) : (
                  <div style={{ fontSize: 12, color: "#4b5563" }}>Não contado</div>
                )}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <Btn small full onClick={() => abrirContagem(p)}>
                {foiContado ? "✏️ Editar contagem" : "📝 Contar"}
              </Btn>
              {foiContado && (
                <Btn small variant="danger" onClick={() => removerContagem(p.id)}>×</Btn>
              )}
            </div>
          </Row>
        );
      })}

      {contados > 0 && (
        <div style={{ marginTop: 16 }}>
          <Btn full onClick={() => setFase("revisao")}>Revisar e confirmar → ({contados} produto(s))</Btn>
        </div>
      )}

      {scanInv && (
        <BarcodeScannerModal
          title="Escanear produto para contar"
          onDetected={handleScanInv}
          onClose={() => setScanInv(false)}
        />
      )}

      {/* Modal de contagem individual */}
      {produtoAtual && (
        <Modal title="Contar produto" onClose={() => setProdutoAtual(null)}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 13, color: "#9ca3af", marginBottom: 4 }}>{produtoAtual.categoria}</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#e2e8f0", marginBottom: 8 }}>{produtoAtual.nome}</div>
            <div style={{ display: "inline-flex", gap: 16, background: "#0a0a1a", borderRadius: 10, padding: "10px 20px" }}>
              <div><div style={{ fontSize: 20, fontWeight: 800, color: "#6b7280" }}>{produtoAtual.estoque}</div><div style={{ fontSize: 11, color: "#4b5563" }}>No sistema</div></div>
              <div style={{ width: 1, background: "#1e1e38" }} />
              <div><div style={{ fontSize: 20, fontWeight: 800, color: "#c084fc" }}>{inputQtd !== "" ? inputQtd : "—"}</div><div style={{ fontSize: 11, color: "#4b5563" }}>Contado</div></div>
            </div>
          </div>

          <div style={{ marginBottom: 16 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#9ca3af", letterSpacing: 0.5, textTransform: "uppercase", display: "block", marginBottom: 6 }}>Quantidade contada fisicamente</label>
            <input
              type="number"
              min="0"
              value={inputQtd}
              onChange={e => setInputQtd(e.target.value)}
              autoFocus
              placeholder="0"
              style={{ background: "#1a1a2e", border: "1px solid #a855f7", borderRadius: 10, padding: "16px", color: "#e2e8f0", fontSize: 28, fontWeight: 800, outline: "none", width: "100%", textAlign: "center" }}
            />
          </div>

          {/* Teclado numérico rápido */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 16 }}>
            {[1, 2, 3, 5, 10, 15, 20, 50].map(n => (
              <button key={n} onClick={() => setInputQtd(String(n))} style={{ background: "#1a1a2e", border: "1px solid #2d2d4a", borderRadius: 8, padding: "10px 6px", color: "#c084fc", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "inherit" }}>
                {n}
              </button>
            ))}
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" full onClick={() => setProdutoAtual(null)}>Cancelar</Btn>
            <Btn full onClick={salvarContagem} style={{ opacity: inputQtd === "" ? 0.5 : 1 }}>✓ Salvar contagem</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


// ─── NAV & SHELL ──────────────────────────────────────────────────────────────
const NAV = [
  { id: "dashboard", label: "Dashboard", icon: "🏠" },
  { id: "produtos", label: "Produtos", icon: "💄" },
  { id: "clientes", label: "Clientes", icon: "👥" },
  { id: "vendas", label: "Vendas", icon: "🛒" },
  { id: "empenhos", label: "Empenhos", icon: "📋" },
  { id: "estoque", label: "Estoque", icon: "📦" },
  { id: "inventario", label: "Inventário", icon: "🔢" },
  { id: "backup", label: "Backup", icon: "💾" },
];

function App() {
  const [page, setPage] = useState("dashboard");
  const { db, commit, syncListenerRef } = useDB();
  const mobile = useIsMobile();
  const PAGE = { dashboard: Dashboard, produtos: Produtos, clientes: Clientes, vendas: Vendas, empenhos: Empenhos, estoque: Estoque, inventario: Inventario, backup: Backup };
  const PageComp = PAGE[page];

  return (
    <div style={{ display: "flex", flexDirection: mobile ? "column" : "row", height: "100vh", height: "100dvh", overflow: "hidden", background: "#07071a", color: "#e2e8f0", fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2d2d4a; border-radius: 3px; }
        input, select, button, textarea { font-family: inherit; }
        select option { background: #1a1a2e; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
        @keyframes scanline {
          0%,100% { transform: translateY(-10px); opacity: 0.4; }
          50% { transform: translateY(10px); opacity: 1; }
        }
      `}</style>

      {/* ── Desktop sidebar ── */}
      {!mobile && (
        <aside style={{ width: 196, flexShrink: 0, background: "#0a0a1f", borderRight: "1px solid #1e1e38", display: "flex", flexDirection: "column", height: "100vh", overflowY: "auto" }}>
          <div style={{ padding: "16px 14px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid #1e1e38" }}>
            <span style={{ fontSize: 22 }}>💅</span>
            <div>
              <div style={{ fontWeight: 800, fontSize: 13, background: "linear-gradient(90deg,#c084fc,#818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>BeautyControl</div>
              <div style={{ fontSize: 9, color: "#4b5563", letterSpacing: 1, textTransform: "uppercase" }}>Gestão</div>
            </div>
          </div>
          <nav style={{ flex: 1, padding: "8px 6px" }}>
            {NAV.map((n, i) => (
              <div key={n.id}>
                {i === NAV.length - 1 && <div style={{ height: 1, background: "#1e1e38", margin: "6px 4px" }} />}
                <button onClick={() => setPage(n.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 9, padding: "9px 10px", borderRadius: 9, border: "none", cursor: "pointer", background: page === n.id ? "#a855f722" : "transparent", color: page === n.id ? "#c084fc" : "#6b7280", fontWeight: page === n.id ? 700 : 500, fontSize: 13, marginBottom: 2, textAlign: "left", borderLeft: `3px solid ${page === n.id ? "#a855f7" : "transparent"}` }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>{n.icon}</span>{n.label}
                </button>
              </div>
            ))}
          </nav>
          <div style={{ padding: "10px", borderTop: "1px solid #1e1e38", textAlign: "center" }}>
            <div style={{ fontSize: 10, color: "#2d2d4a" }}>BeautyControl v1.0</div>
          </div>
        </aside>
      )}

      {/* ── Main ── */}
      <main style={{ flex: 1, minWidth: 0, overflowY: "auto", overflowX: "hidden", WebkitOverflowScrolling: "touch", height: mobile ? "calc(100dvh - 58px)" : "100vh", padding: mobile ? "14px 14px 24px" : "22px 24px" }}>
        {mobile && (
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
            <span style={{ fontSize: 20 }}>💅</span>
            <span style={{ fontWeight: 800, fontSize: 14, background: "linear-gradient(90deg,#c084fc,#818cf8)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>BeautyControl</span>
            <span style={{ marginLeft: "auto", fontSize: 12, color: "#6b7280", fontWeight: 700 }}>{NAV.find(n => n.id === page)?.label}</span>
          </div>
        )}
        <PageComp db={db} commit={commit} syncListenerRef={syncListenerRef} />
      </main>

      {/* ── Mobile bottom nav ── */}
      {mobile && (
        <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#0a0a1f", borderTop: "1px solid #1e1e38", display: "flex", zIndex: 200 }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "7px 2px 8px", background: "none", border: "none", cursor: "pointer", borderTop: `2px solid ${page === n.id ? "#a855f7" : "transparent"}`, minWidth: 0 }}>
              <span style={{ fontSize: 17, lineHeight: 1 }}>{n.icon}</span>
              <span style={{ fontSize: 8, marginTop: 3, color: page === n.id ? "#c084fc" : "#4b5563", fontWeight: page === n.id ? 700 : 400, letterSpacing: 0.1 }}>{n.label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
setTimeout(function(){
  var s=document.getElementById('splash');
  if(s){s.classList.add('fade');setTimeout(function(){try{s.remove()}catch(e){}},500);}
},1200);
</script>

<script>
(function(){
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
  }
  var d=null;
  var sa=function(){return window.matchMedia('(display-mode:standalone)').matches||navigator.standalone===true;};
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault(); d=e;
    if(sa()) return;
    setTimeout(function(){
      if(!d) return;
      var c=document.createElement('div');
      c.style.cssText='position:fixed;bottom:66px;left:10px;right:10px;z-index:500';
      c.innerHTML='<div style="background:#1e1e38;border:1px solid #a855f7;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 40px #000c;font-family:sans-serif"><span style="font-size:28px;flex-shrink:0">&#x1F485;</span><div style="flex:1;min-width:0"><div style="font-weight:800;color:#e2e8f0;font-size:14px">Instalar BeautyControl</div><div style="font-size:12px;color:#9ca3af;margin-top:3px">Offline • Câmera • Drive sync</div></div><button id="pi" style="background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:9px;color:#fff;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap">Instalar</button><button id="pd" style="background:none;border:none;color:#6b7280;cursor:pointer;font-size:24px;padding:0 4px;line-height:1">×</button></div>';
      document.body.appendChild(c);
      document.getElementById('pi').onclick=function(){if(!d)return;d.prompt();d.userChoice.then(function(){d=null;c.remove();});};
      document.getElementById('pd').onclick=function(){c.remove();d=null;};
    },2000);
  });
  window.addEventListener('appinstalled',function(){d=null;});
})();
</script>
